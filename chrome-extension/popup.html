<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuitSupply Shipment Capture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      color: #000;
      background-color: #fff;
    }

    .header {
      background-color: #000;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .content {
      padding: 15px;
    }

    .status {
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 4px;
      font-size: 13px;
    }

    .status.success {
      background-color: #e8f5e9;
      border: 1px solid #2e7d32;
      color: #2e7d32;
    }

    .status.error {
      background-color: #ffebee;
      border: 1px solid #c62828;
      color: #c62828;
    }

    .status.info {
      background-color: #e3f2fd;
      border: 1px solid #1976d2;
      color: #1976d2;
    }

    .data-preview {
      background-color: #f5f5f5;
      border: 1px solid #e0e0e0;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
    }

    .data-item {
      margin-bottom: 8px;
      font-size: 13px;
    }

    .data-item strong {
      font-weight: 600;
      color: #000;
      display: inline-block;
      min-width: 120px;
    }

    .data-item span {
      color: #333;
    }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #666;
    }

    .empty-state p {
      margin-bottom: 10px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background-color: #000;
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .btn:hover {
      background-color: #333;
    }

    .btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: #fff;
      color: #000;
      border: 1px solid #000;
    }

    .btn-secondary:hover {
      background-color: #f5f5f5;
    }

    .hidden {
      display: none;
    }

    .footer {
      padding: 10px 15px;
      border-top: 1px solid #e0e0e0;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Shipment Capture</h1>
  </div>

  <div class="content">
    <div id="status-message" class="status hidden"></div>

    <div id="loading" class="status info">
      Loading...
    </div>

    <div id="data-section" class="hidden">
      <div class="data-preview" id="data-preview">
        <!-- Data will be inserted here -->
      </div>

      <div id="campusship-controls" class="hidden">
        <label for="shipment-select" style="display:block; font-size:12px; margin: 8px 0 6px; color:#333;">Pending shipment:</label>
        <select id="shipment-select" style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:4px; margin-bottom:10px;"></select>
        <button id="fill-btn" class="btn">Fill This UPS Form</button>
        <button id="refresh-pending-btn" class="btn btn-secondary">Refresh Pending List</button>
      </div>

      <div id="tracking-controls">
        <button id="send-btn" class="btn">Send to Stockroom Dashboard</button>
        <button id="open-form-btn" class="btn btn-secondary">Open Form & Auto-Fill</button>
        <button id="refresh-btn" class="btn btn-secondary">Refresh Data</button>
      </div>
    </div>

    <div id="empty-state" class="empty-state hidden">
      <p><strong>No shipment data found</strong></p>
      <p>Navigate to a UPS tracking page with shipment details.</p>
      <button id="refresh-empty-btn" class="btn">Try Again</button>
    </div>
  </div>

  <div class="footer">
    SuitSupply San Francisco Stockroom
  </div>

  <script src="popup.js"></script>
</body>
</html>
