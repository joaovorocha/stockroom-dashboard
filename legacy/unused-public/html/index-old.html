<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Stockroom Dashboard</title>
  <link rel="stylesheet" href="/css/terminal.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>STOCKROOM DASHBOARD</h1>
      <div class="subtitle">San Francisco</div>
      <div class="date" id="current-date"></div>
    </div>

    <!-- Personalized Section (shown when logged in) -->
    <div id="personalized-section" class="hidden">
      <div class="welcome">
        <h2 id="welcome-message">Welcome</h2>
        <div class="info" id="room-assignment"></div>
      </div>

      <!-- Quick Data Cards -->
      <div class="quick-data">
        <div class="data-card">
          <h4>Fitting Room Assignment</h4>
          <div class="value" id="fitting-room">—</div>
        </div>
        <div class="data-card">
          <h4>Today's Goal</h4>
          <div class="value" id="goals">—</div>
        </div>
        <div class="data-card">
          <h4>Closing Duties</h4>
          <div class="value" id="closing-duties" style="font-size: 1em;">—</div>
        </div>
      </div>

      <!-- Colleagues Section -->
      <div class="colleagues-section">
        <h3>Your Team</h3>
        <div id="colleagues-list"></div>
        <button class="expand-btn" id="expand-colleagues">See All Colleagues</button>
      </div>
    </div>

    <!-- Login Prompt (shown when not logged in) -->
    <div id="login-prompt" class="hidden">
      <div class="welcome">
        <h2>Quick Access</h2>
        <p>Login for personalized dashboard with your assignments and goals.</p>
        <a href="/login" class="btn" style="display: inline-block; margin-top: 15px;">Login with Employee ID</a>
      </div>
    </div>

    <!-- MAO Order Lookup Tool -->
    <div class="tool-section">
      <h3>MAO Order Lookup</h3>
      <div class="tool-description">Enter a PSUS order number to view order status</div>
      <div class="inline-form">
        <div class="form-group">
          <label for="mao-order">Order Number (PSUS + 8 digits)</label>
          <input type="text" id="mao-order" placeholder="e.g., PSUS02101002" maxlength="20">
        </div>
        <button class="btn" id="mao-lookup-btn">Look Up Order</button>
      </div>
      <div id="mao-error" class="error hidden" style="margin-top: 15px;"></div>
    </div>

    <!-- Logout (shown when logged in) -->
    <div id="logout-section" class="hidden" style="text-align: center; margin: 30px 0;">
      <button class="btn btn-secondary" id="logout-btn" style="max-width: 200px;">Logout</button>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
