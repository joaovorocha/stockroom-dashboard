<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusShip CSV Import - Stockroom Dashboard</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/shared-header.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <style>
    .card { background: var(--background); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .row { display:flex; gap: 10px; align-items:center; flex-wrap: wrap; }
    .muted { color: var(--text-secondary); font-size: 12px; }
    pre { background: #0b0b0b; color: #f3f3f3; padding: 12px; border-radius: 8px; overflow:auto; max-height: 360px; }
    input[type="file"]{ border:1px solid var(--border); padding:10px; border-radius:8px; background: var(--background); }
  </style>
</head>
<body>
  <div id="sharedHeaderMount"></div>

  <div class="dashboard-layout" style="grid-template-columns: 1fr;">
    <main class="main-content">
      <section class="section">
        <div class="section-header">
          <h2>CampusShip CSV Import</h2>
          <button class="btn btn-secondary" onclick="window.location.href='/shipments'">&larr; Back to Shipments</button>
        </div>

        <div class="card">
          <div class="row">
            <input id="file" type="file" accept=".csv,.txt,application/vnd.ms-excel" />
            <button id="importBtn" class="btn btn-primary">Import CSV</button>
          </div>
          <div class="muted" style="margin-top:8px;">
            Upload a CampusShip export file (.csv). Missing columns are OK; fields will be left blank.
          </div>
          <div class="muted" style="margin-top:8px;">
            This uses server merge logic to avoid duplicates (tracking # → order # → name+zip+address).
          </div>
        </div>

        <div class="card">
          <h3 style="margin-top:0;">Result</h3>
          <pre id="result">Waiting for upload…</pre>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/shared-header.js"></script>
  <script>
    const fileInput = document.getElementById('file');
    const importBtn = document.getElementById('importBtn');
    const resultEl = document.getElementById('result');

    function setResult(obj) {
      resultEl.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
    }

    importBtn.addEventListener('click', async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        setResult('Pick a CSV file first.');
        return;
      }

      importBtn.disabled = true;
      importBtn.textContent = 'Importing…';
      try {
        const form = new FormData();
        form.append('file', file);

        const resp = await fetch('/api/shipments/import-campusship-csv', {
          method: 'POST',
          body: form
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || 'Import failed');
        setResult(data);
      } catch (e) {
        setResult({ success: false, error: e.message || String(e) });
      } finally {
        importBtn.disabled = false;
        importBtn.textContent = 'Import CSV';
      }
    });
  </script>
</body>
</html>
