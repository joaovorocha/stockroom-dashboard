<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Game Plan - Stockroom Dashboard</title>
  <link rel="stylesheet" href="/css/terminal.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>DAILY GAME PLAN</h1>
      <div class="subtitle">San Francisco</div>
    </div>

    <div class="date-nav">
      <button id="prev-day">← Previous Day</button>
      <div class="current-date" id="current-date"></div>
      <button id="next-day">Next Day →</button>
    </div>

    <button id="today-btn" class="btn" style="margin-bottom: 20px;">Jump to Today</button>

    <div id="loading" class="loading">Loading game plan...</div>
    <div id="error" class="error hidden"></div>

    <div id="gameplan-content" class="hidden">
      <div class="welcome" id="gameplan-header">
        <h2 id="gameplan-date"></h2>
        <div id="metrics-section"></div>
      </div>

      <div style="overflow-x: auto;">
        <table id="gameplan-table">
          <thead id="table-header"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div class="nav-section" style="margin-top: 30px;">
      <a href="/" class="btn btn-secondary">← Back to Home</a>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/gameplan.js"></script>
</body>
</html>
