<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <title>Radio Transcripts | Suitsupply</title>
  <link rel="stylesheet" href="/css/theme.css?v=14">
  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <style>
    .transcript-list { max-width: 800px; margin: 30px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 24px; }
    .transcript-actions-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin: 10px 0 16px; }
    .transcript-status { color:#666; font-size: 13px; }
    .transcript-item { border-bottom: 1px solid #eee; padding: 12px 0; }
    .transcript-item:last-child { border-bottom: none; }
    .transcript-meta { color: #888; font-size: 13px; margin-bottom: 4px; }
    .transcript-row { display: flex; align-items: flex-start; gap: 12px; }
    .transcript-actions { width: 72px; flex: 0 0 72px; display: flex; gap: 6px; }
    .transcript-actions button { height: 30px; padding: 0 10px; border-radius: 6px; border: 1px solid #ddd; background: #f8f8f8; cursor: pointer; font-size: 12px; }
    .transcript-actions button:disabled { opacity: 0.5; cursor: not-allowed; }
    .transcript-text { font-size: 16px; color: #222; flex: 1 1 auto; }
    .transcript-error { color: #b00020; margin-top: 10px; }
  </style>
</head>
<body>
  <!-- Shared Header Mount -->
  <div id="shared-header-mount"></div>
  <div class="transcript-list" id="transcriptList">
    <h2>Recent Radio Transcripts</h2>
    <div class="transcript-actions-bar">
      <button id="listenLiveBtn" class="btn btn-secondary" type="button">Listen Live</button>
      <div id="listenLiveStatus" class="transcript-status">Live listen: Off</div>
      <div id="eventsStatus" class="transcript-status">Realtime: Connecting…</div>
    </div>
    <audio id="liveAudio" preload="none" style="display:none"></audio>
    <audio id="clipPlayer" preload="none" style="display:none"></audio>
    <div id="transcripts"></div>
  </div>
  <script>
    let lastId = 0;
    let currentlyPlayingId = null;
    let livePlaying = false;
    let eventsSource = null;

    function escapeText(v) {
      return (v ?? '').toString();
    }

    function formatTs(item) {
      const ts = item?.timestamp || item?.ts || item?.time || item?.createdAt || null;
      if (!ts) return '';
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleString();
    }

    function getClipUrl(item) {
      const u = item?.clipUrl || item?.audioUrl || item?.wavUrl || '';
      return (u || '').toString().trim();
    }

    function stopClipIfPlaying() {
      const player = document.getElementById('clipPlayer');
      if (!player) return;
      try { player.pause(); } catch (_) {}
      try { player.currentTime = 0; } catch (_) {}
      currentlyPlayingId = null;
    }

    async function togglePlayClip(item) {
      const player = document.getElementById('clipPlayer');
      if (!player) return;

      const clipUrl = getClipUrl(item);
      if (!clipUrl) return;

      // Toggle if same item.
      if (currentlyPlayingId === item?.id && !player.paused) {
        stopClipIfPlaying();
        refreshPlayButtons();
        return;
      }

      stopClipIfPlaying();
      currentlyPlayingId = item?.id;
      player.src = clipUrl;
      try {
        await player.play();
      } catch (_) {
        // Autoplay/gesture restrictions or load error.
        currentlyPlayingId = null;
      }
      refreshPlayButtons();
    }

    function refreshPlayButtons() {
      const buttons = document.querySelectorAll('button[data-clip-id]');
      buttons.forEach((btn) => {
        const id = Number(btn.getAttribute('data-clip-id'));
        const isPlaying = (currentlyPlayingId != null && id === currentlyPlayingId);
        btn.textContent = isPlaying ? 'Stop' : 'Play';
      });
    }

    function setEventsStatus(text) {
      const el = document.getElementById('eventsStatus');
      if (el) el.textContent = text;
    }

    function setLiveStatus(text) {
      const el = document.getElementById('listenLiveStatus');
      if (el) el.textContent = text;
    }

    async function toggleLiveListen() {
      const audio = document.getElementById('liveAudio');
      if (!audio) return;
      if (livePlaying) {
        try { audio.pause(); } catch (_) {}
        audio.removeAttribute('src');
        audio.load();
        livePlaying = false;
        setLiveStatus('Live listen: Off');
        return;
      }
      audio.src = `/api/radio/live-audio?ts=${Date.now()}`;
      try {
        await audio.play();
        livePlaying = true;
        setLiveStatus('Live listen: On');
      } catch (_) {
        livePlaying = false;
        setLiveStatus('Live listen: Tap to allow audio');
      }
    }

    function appendTranscripts(items, { replace = false } = {}) {
      const container = document.getElementById('transcripts');
      if (!container) return;
      const list = Array.isArray(items) ? items : [];

      if (replace) container.innerHTML = '';

      if (!list.length && replace) {
        const empty = document.createElement('div');
        empty.textContent = 'No transcripts found.';
        container.appendChild(empty);
        return;
      }

      list.forEach((t) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'transcript-item';

        const meta = document.createElement('div');
        meta.className = 'transcript-meta';
        meta.textContent = formatTs(t);

        const text = document.createElement('div');
        text.className = 'transcript-text';
        text.textContent = escapeText(t?.text || t?.transcript || '');

        const row = document.createElement('div');
        row.className = 'transcript-row';

        const actions = document.createElement('div');
        actions.className = 'transcript-actions';

        const clipUrl = getClipUrl(t);
        const playBtn = document.createElement('button');
        playBtn.type = 'button';
        playBtn.setAttribute('data-clip-id', String(t?.id ?? ''));
        playBtn.disabled = !clipUrl;
        playBtn.textContent = 'Play';
        playBtn.addEventListener('click', () => togglePlayClip(t));
        actions.appendChild(playBtn);

        row.appendChild(actions);
        row.appendChild(text);

        wrapper.appendChild(meta);
        wrapper.appendChild(row);
        container.appendChild(wrapper);
      });

      refreshPlayButtons();
    }

    async function fetchTranscripts({ afterId = 0, limit = 200 } = {}) {
      const qs = new URLSearchParams();
      if (afterId) qs.set('afterId', String(afterId));
      if (limit) qs.set('limit', String(limit));
      const url = `/api/radio/transcripts?${qs.toString()}`;
      const res = await fetch(url, { credentials: 'include' });
      if (!res.ok) {
        if (res.status === 401) {
          throw new Error('Not authenticated on this domain. Please log in again, then refresh this page.');
        }
        const body = await res.json().catch(() => ({}));
        throw new Error(body?.error || body?.message || `Failed to load transcripts (${res.status})`);
      }
      const data = await res.json();
      return Array.isArray(data?.items) ? data.items : [];
    }

    async function loadInitial() {
      try {
        const items = await fetchTranscripts({ afterId: 0, limit: 200 });
        if (items.length) lastId = Number(items[items.length - 1]?.id || 0) || 0;
        appendTranscripts(items.slice().reverse(), { replace: true });
      } catch (e) {
        const container = document.getElementById('transcripts');
        if (container) {
          container.innerHTML = '';
          const err = document.createElement('div');
          err.className = 'transcript-error';
          err.textContent = e?.message || 'Failed to load transcripts';
          container.appendChild(err);
        }
      }
    }

    async function poll() {
      try {
        const newer = await fetchTranscripts({ afterId: lastId, limit: 200 });
        if (newer.length) {
          lastId = Number(newer[newer.length - 1]?.id || lastId) || lastId;
          appendTranscripts(newer, { replace: false });
        }
      } catch (_) {}
    }

    function connectEvents() {
      if (eventsSource) {
        try { eventsSource.close(); } catch (_) {}
      }
      setEventsStatus('Realtime: Connecting…');
      try {
        eventsSource = new EventSource(`/api/radio/events?afterId=${lastId}`);
        eventsSource.addEventListener('ready', () => {
          setEventsStatus('Realtime: Connected');
        });
        eventsSource.addEventListener('transcript', (e) => {
          try {
            const item = JSON.parse(e.data);
            const id = Number(item?.id || 0);
            if (id > lastId) lastId = id;
            appendTranscripts([item], { replace: false });
          } catch (_) {}
        });
        eventsSource.onerror = () => {
          setEventsStatus('Realtime: Disconnected (retrying)');
          try { eventsSource.close(); } catch (_) {}
          setTimeout(connectEvents, 2000);
        };
      } catch (_) {
        setEventsStatus('Realtime: Disconnected');
      }
    }

    const listenBtn = document.getElementById('listenLiveBtn');
    if (listenBtn) listenBtn.addEventListener('click', toggleLiveListen);

    loadInitial().then(connectEvents);
  </script>
  <script src="/js/shared-header.js?v=24"></script>
</body>
</html>
