<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <title>Edit Game Plan - San Francisco | Suitsupply</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stockroom">
  <link rel="stylesheet" href="/css/theme.css?v=14">
	  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <link rel="stylesheet" href="/css/dashboard.css?v=17">
  <link rel="stylesheet" href="/css/mobile.css?v=3">
  <style>
    .edit-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .edit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .edit-header h2 {
      font-size: 20px;
    }

	    .edit-actions {
	      display: flex;
	      gap: 12px;
	      flex-wrap: wrap;
	    }

	    @media (max-width: 600px) {
	      .edit-header {
	        flex-direction: column;
	        align-items: stretch;
	        gap: 12px;
	      }

	      .edit-actions {
	        order: -1; /* buttons first, summary text below */
	        justify-content: space-between;
	      }

	      #weeklyGoalGrid {
	        grid-template-columns: 70px 1fr 56px 90px !important;
	      }
	    }

    /* Looker Import Banner */
    .looker-import-banner {
      display: flex;
      align-items: center;
      gap: 16px;
      background: linear-gradient(135deg, #e0f2fe, #dbeafe);
      border: 1px solid #3b82f6;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .banner-icon {
      font-size: 24px;
    }

    .banner-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .banner-content strong {
      color: #1d4ed8;
    }

    .banner-content span {
      font-size: 12px;
      color: #3b82f6;
    }

    .banner-note {
      margin-left: auto;
      font-size: 13px;
      color: #1e40af;
    }

    .readonly-indicator {
      font-size: 12px;
    }

    /* Edit Legend */
    .edit-legend {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: 6px;
      font-size: 13px;
    }

    .edit-legend .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .edit-legend .legend-item.editable {
      color: var(--success);
    }

    .edit-legend .legend-item.readonly {
      color: var(--text-secondary);
    }

    /* Read-only field styling */
    .edit-field.readonly label::after {
      content: " 🔒";
      font-size: 10px;
    }

    .edit-field.readonly input,
    .edit-field.readonly select,
    .edit-field.readonly textarea {
      background: #f3f4f6;
      color: #6b7280;
      cursor: not-allowed;
      border-color: #d1d5db;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    /* Collapsible employee sections */
    .section-card {
      background: #f1f3f7;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.09);
      margin-bottom: 32px;
      padding: 18px 18px 0 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-title h3 {
      margin: 0;
      font-size: 1.2em;
      font-weight: 600;
    }

    .section-title-right {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .section-count {
      background: #e0e3ea;
      color: #374151;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      padding: 2px 10px;
      min-width: 28px;
      text-align: center;
    }

    .toggle-btn {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 8px;
      background: #e0e3ea;
      color: #111827;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }

    .toggle-btn:hover {
      background: #d2d6df;
    }

    .collapsed-section .section-grid {
      display: none;
    }

    /* When section is collapsed, keep left/right layout but center vertically in the card */
    .collapsed-section.section-card {
      padding-bottom: 18px; /* match top padding for vertical centering */
    }

    .collapsed-section .section-title {
      margin-bottom: 0;
    }

    .notes-card-toggle {
      transition: color 0.15s ease;
    }

    .notes-card.collapsed .notes-card-body {
      display: none;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--background);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 24px;
      width: 90%;
      max-width: 520px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .copy-fields-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    .copy-fields-list label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .edit-card {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .edit-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .edit-card-photo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface);
    }

    .edit-card-photo.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .edit-card-info h4 {
      font-size: 15px;
      margin: 0 0 4px;
    }

    .edit-card-info span {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .edit-card-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .edit-card.off {
      background: #eef0f3;
      border-color: #d1d5db;
      opacity: 0.7;
    }

    .edit-card.off .edit-card-fields {
      pointer-events: none;
      filter: grayscale(0.15);
    }

    .edit-card-header {
      justify-content: space-between;
      flex-wrap: wrap;
      row-gap: 10px;
    }

    .edit-card-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .edit-card-actions {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      flex-shrink: 0;
    }

    .off-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
    }

    .off-toggle-text {
      font-size: 12px;
      font-weight: 700;
      color: #111827;
      white-space: nowrap;
    }

    .off-switch {
      position: relative;
      width: 46px;
      height: 26px;
      flex: 0 0 auto;
    }

    .off-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .off-switch-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 999px;
      transition: background 0.15s ease;
    }

    .off-switch-slider:before {
      content: "";
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 999px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      transition: transform 0.15s ease;
    }

    .off-switch input:checked + .off-switch-slider {
      background: #22c55e;
    }

    .off-switch input:checked + .off-switch-slider:before {
      transform: translateX(20px);
    }

    .weekly-goal-slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .weekly-goal-step-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
    }

    .weekly-goal-step-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .weekly-goal-slider {
      width: 100%;
    }

	    .off-badge {
	      font-size: 12px;
	      font-weight: 600;
	      color: #6b7280;
	      background: #e5e7eb;
	      border: 1px solid #d1d5db;
	      border-radius: 999px;
	      padding: 2px 8px;
	    }
	
	    .sa-status-pill {
	      font-size: 12px;
	      font-weight: 600;
	      color: #111827;
	      background: #f3f4f6;
	      border: 1px solid #e5e7eb;
	      border-radius: 999px;
	      padding: 2px 8px;
	      white-space: nowrap;
	    }
	
	    .sa-status-pill.off {
	      color: #6b7280;
	      background: #e5e7eb;
	      border-color: #d1d5db;
	    }

    .edit-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .edit-field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .edit-field select,
    .edit-field input,
    .edit-field textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-title h3 {
      font-size: 18px;
    }

    .section-count {
      background: var(--surface);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .management-section .edit-card {
      border-left: 3px solid var(--primary);
    }

    .closing-duties-field {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .duty-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 12px;
    }

	    .duty-chip.selected {
	      background: #22c55e;
	      color: #fff;
	      border-color: #22c55e;
	    }
	    .duty-chip.taken {
	      background: #fee2e2;
	      color: #991b1b;
	      border-color: #fecaca;
	      opacity: 0.9;
	    }
	    .duty-chip.unassigned {
	      background: #f1f5f9;
	      color: #0f172a;
	      border-color: #e2e8f0;
	    }

	    .duty-chip:hover {
	      cursor: pointer;
	    }
	    .duty-chip.taken:hover {
	      cursor: not-allowed;
	    }

    .zone-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      min-height: 44px;
    }

    .zone-chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease;
    }

    .zone-chip:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }

    .zone-chip.selected {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }

    /* Notes Editor Section */
    .notes-edit-section {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 32px;
    }

    .notes-edit-section .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .notes-editor-container {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .notes-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .notes-toolbar button {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: var(--background);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }

    .notes-toolbar button:hover {
      background: var(--surface);
      border-color: var(--primary);
    }

    .notes-toolbar button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .notes-toolbar select {
      height: 32px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--background);
      font-size: 13px;
      cursor: pointer;
    }

    .notes-toolbar select:hover {
      border-color: var(--primary);
    }

    .notes-toolbar input[type="color"] {
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }

    .notes-toolbar input[type="color"]:hover {
      border-color: var(--primary);
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 6px;
    }

    .notes-editor {
      min-height: 250px;
      max-height: 400px;
      overflow-y: auto;
      padding: 20px;
      background: var(--background);
      font-size: 14px;
      line-height: 1.7;
      outline: none;
    }

    .notes-editor:empty:before {
      content: attr(placeholder);
      color: var(--text-muted);
    }

    .notes-editor:focus {
      box-shadow: inset 0 0 0 2px var(--primary);
    }

    .save-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--success);
      color: #fff;
      padding: 12px 24px;
      border-radius: 4px;
      display: none;
    }

    .save-indicator.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  
    .notes-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 32px; overflow: hidden; }
    .notes-card-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .notes-card-header:hover { background: #f5f5f5; }
    .notes-card-toggle { transition: color 0.15s ease; }
    .notes-card.collapsed .notes-card-body { display: none; }
    .notes-card-body { padding: 20px; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; }
    .modal-overlay.show { opacity: 1; visibility: visible; }
    .modal { background: var(--background); border-radius: 12px; padding: 24px; width: 90%; max-width: 450px; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; }
    .copy-fields-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
    .copy-fields-list label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
    .btn { display: inline-flex; align-items: center; padding: 10px 20px; font-size: 14px; font-weight: 500; border-radius: 6px; border: 1px solid transparent; cursor: pointer; text-decoration: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #1a1a1a; }
    .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
    .btn-secondary:hover { background: #e5e5e5; }
    .btn-outline-danger { background: transparent; color: #dc2626; border-color: #dc2626; }
    .btn-outline-danger:hover { background: #dc2626; color: #fff; }

    /* Used for fitting room select status */
    .zone-available {
      color: #15803d !important;
      border-color: #bbf7d0 !important;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.12) !important;
      background: transparent !important;
    }
    .zone-taken {
      color: #a16207 !important;
      border-color: #fde68a !important;
      box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.14) !important;
      background: transparent !important;
    }
  </style>
</head>
<body>
  <!-- Shared Header Mount -->
  <div id="shared-header-mount"></div>

  <div class="edit-container">
	    <div class="edit-header">
	      <div>
	        <h2>Edit Game Plan</h2>
	        <span id="lastEditedBy" style="font-size: 12px; color: var(--text-secondary);"></span>
	        <div id="targetPerSaInfo" style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;"></div>
	      </div>
	      <div class="edit-actions">
	        <button class="btn btn-sm" id="copyYesterdayBtn">📋 Copy from Yesterday</button>
	        <button class="btn btn-secondary" id="clearAllBtn" style="background:#f87171;">Clear All</button>
	        <a href="/dashboard" class="btn btn-secondary">Cancel</a>
	        <button class="btn btn-primary" id="saveAllBtn">Publish</button>
	      </div>
	    </div>

	    <section class="section-card" id="weeklyGoalSection" style="margin-bottom: 18px;">
	      <div class="section-title" style="margin-bottom: 10px;">
	        <h3 style="margin:0;">Weekly Goal Distribution</h3>
	        <div style="display:flex; gap:10px; align-items:center;">
	          <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary); text-transform:none;">
	            <input type="checkbox" id="weeklyGoalEnabled">
	            Use sliders
	          </label>
	          <button class="btn btn-sm btn-outline" type="button" id="weeklyGoalNormalizeBtn">Normalize</button>
	          <button class="btn btn-sm btn-primary" type="button" id="weeklyGoalSaveBtn">Save</button>
	        </div>
	      </div>
	      <div id="weeklyGoalMeta" style="font-size:12px; color:var(--text-secondary); margin-bottom: 10px;"></div>
	      <div id="weeklyGoalGrid" style="display:grid; grid-template-columns: 100px 1fr 70px 120px; gap: 10px; align-items:center;"></div>
	      <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);">
	        <div style="font-size:13px; color:var(--text-secondary);">Total</div>
	        <div id="weeklyGoalTotal" style="font-weight:700;">100%</div>
	      </div>
	    </section>

	    <!-- Game Plan Notes Section -->
	    <section class="notes-card collapsed" id="notesCard">
	      <div class="notes-card-header" id="notesCardHeader">
	        <h3 style="margin:0">📝 Notes</h3>
	        <span class="notes-card-toggle">▸</span>
      </div>
	      <div class="notes-card-body">
      <div class="notes-editor-container">
        <div class="notes-templates-bar" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom: 10px;">
          <select id="notesTemplateSelect" style="min-width: 220px;">
            <option value="">Notes templates…</option>
          </select>
          <button class="btn btn-sm btn-outline" type="button" id="applyNotesTemplateBtn" disabled>Apply</button>
          <button class="btn btn-sm btn-outline" type="button" id="saveNotesTemplateBtn">Save Template</button>
          <button class="btn btn-sm btn-secondary" type="button" id="deleteNotesTemplateBtn" disabled>Delete</button>
        </div>
        <div class="notes-toolbar" id="notesToolbar">
          <!-- Font Family -->
          <select id="fontNameSelect" title="Font">
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Verdana">Verdana</option>
            <option value="Courier New">Courier New</option>
          </select>
          <span class="toolbar-divider"></span>
          <!-- Font Size -->
          <select id="fontSizeSelect" title="Font Size">
            <option value="1">8pt</option>
            <option value="2">10pt</option>
            <option value="3" selected>12pt</option>
            <option value="4">14pt</option>
            <option value="5">18pt</option>
            <option value="6">24pt</option>
            <option value="7">36pt</option>
          </select>
          <span class="toolbar-divider"></span>
          <!-- Basic Formatting -->
          <button type="button" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
          <button type="button" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>

  <script src="/js/shared-header.js?v=23"></script>
  <script>
        let currentUser = null;
        let employees = { SA: [], BOH: [], MANAGEMENT: [], TAILOR: [] };
          let settings = {};
          let storeConfig = { requireSaShift: false, currency: 'USD' };
            let gameplanData = { notes: '', assignments: {} };
        let storeMetrics = {};
            let currentStoreDayInfo = null;
            let weeklyGoalDistribution = { weekKey: null, enabled: false, percents: [15, 15, 14, 14, 14, 14, 14], updatedAt: null, updatedBy: null };
              const MAX_WEEKLY_DAY_PERCENT = 40;
              let notesTemplates = [];
					    let hasUnsavedChanges = false;
					    let currentEditorDate = null;
				    const EDIT_DEBUG = false;
            function editLog(...args) { if (EDIT_DEBUG) console.log(...args); }
            function editWarn(...args) { if (EDIT_DEBUG) console.warn(...args); }

            function authFetch(url, options = {}) {
              const merged = { credentials: 'include', ...options };
              if (options && options.headers) merged.headers = options.headers;
              return fetch(url, merged);
            }

				    function getLocalISODate() {
				      const d = new Date();
				      const pad = (n) => String(n).padStart(2, '0');
				      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
				    }

            async function getStoreDayInfo() {
              try {
                const resp = await authFetch('/api/gameplan/today');
                return resp.ok ? await resp.json() : null;
              } catch (_) {
                return null;
              }
            }

				    function resetEditorForNewDay() {
				      ['SA', 'MANAGEMENT', 'BOH', 'TAILOR'].forEach(role => {
				        (employees[role] || []).forEach(emp => {
				          // New store-day starts with everyone OFF until a manager marks them In-Store.
				          emp.isOff = true;
				          clearDailyAssignmentFields(emp);
				        });
				      });

			      const notesEditor = document.getElementById('notesEditor');
			      if (notesEditor) notesEditor.innerHTML = '';
			      gameplanData.notes = '';
			      gameplanData.assignments = {};

			      const lastEdited = document.getElementById('lastEditedBy');
			      if (lastEdited) lastEdited.textContent = '';

			      updateTargetPerSaInfo();
			      if (typeof renderSA === 'function') setTimeout(renderSA, 0);
			      if (typeof renderBOH === 'function') setTimeout(renderBOH, 0);
			      if (typeof renderTailors === 'function') setTimeout(renderTailors, 0);
			      if (typeof renderManagement === 'function') setTimeout(renderManagement, 0);
			    }

				    function startDayRolloverWatcher() {
				      if (document.dayRolloverWatcher) return;
				      document.dayRolloverWatcher = true;

				      // Initialize using server store-day (timezone + dayStart aware).
				      // If the request fails, keep the current date and avoid repeated prompts.
				      currentEditorDate = null;
				      getStoreDayInfo().then((info) => {
				        currentEditorDate = info?.date || getLocalISODate();
				      }).catch(() => {
				        currentEditorDate = getLocalISODate();
				      });

				      setInterval(async () => {
				        const info = await getStoreDayInfo();
				        if (!info?.date) return; // don't flap between server/local dates
				        const next = info.date;
				        if (!currentEditorDate) {
				          currentEditorDate = next;
				          return;
				        }
				        if (next === currentEditorDate) return;

				        currentEditorDate = next;
				        hasUnsavedChanges = false;
				        resetEditorForNewDay();
				      }, 60000);
				    }
	
		    function findEmployeeById(empId) {
		      for (const type of Object.keys(employees)) {
		        const emp = (employees[type] || []).find(e => e.id === empId);
		        if (emp) return emp;
		      }
		      return null;
		    }

		    function clearDailyAssignmentFields(emp) {
		      if (!emp) return;
		      emp.zones = [];
		      emp.zone = '';
		      emp.fittingRoom = '';
		      emp.scheduledLunch = '';
		      emp.closingSections = [];
		      emp.shift = '';
		      emp.lunch = '';
		      emp.taskOfTheDay = '';
		      emp.role = '';
		      emp.station = '';
		    }
		
			    function formatCurrency(amount) {
			      const n = Number(amount);
			      if (!Number.isFinite(n)) return '--';
			      const currency = (storeConfig?.currency || 'USD').toString().trim() || 'USD';
			      return new Intl.NumberFormat('en-US', { style: 'currency', currency, maximumFractionDigits: 0 }).format(n);
			    }

			    function getDailyTargetValue() {
			      const retailWeek = storeMetrics?.retailWeek || null;
			      const weekly = Number(retailWeek?.target || 0);

			      // If the manager enabled per-day sliders, use weekly target * day%.
			      const dayIndex = Number(currentStoreDayInfo?.weekdayIndex);
			      if (weeklyGoalDistribution?.enabled && Number.isFinite(weekly) && weekly > 0 && Number.isFinite(dayIndex) && dayIndex >= 0 && dayIndex <= 6) {
			        const pct = Number(weeklyGoalDistribution?.percents?.[dayIndex]);
			        if (Number.isFinite(pct)) return weekly * (pct / 100);
			      }

			      const direct = Number(retailWeek?.targetPerDay || 0);
			      if (direct) return direct;
			      if (Number.isFinite(weekly) && weekly > 0) return weekly / 7;
			      return null;
			    }

				    function getTargetPerSaTodayValue() {
				      const working = (employees.SA || []).filter(e => {
				        const isOff = (e?.isOff === true) || (e?.isOff === 'true');
				        if (storeConfig?.requireSaShift) {
				          const shift = (e?.shift || '').toString().trim();
				          return !isOff && !!shift;
				        }
				        return !isOff;
				      }).length;
				      const dailyTarget = getDailyTargetValue();
				      if (!dailyTarget || !working) return null;
				      return dailyTarget / working;
				    }
			
			    function updateTargetPerSaInfo() {
			      const el = document.getElementById('targetPerSaInfo');
			      if (!el) return;
			
				      const working = (employees.SA || []).filter(e => {
				        const isOff = (e?.isOff === true) || (e?.isOff === 'true');
				        if (storeConfig?.requireSaShift) {
				          const shift = (e?.shift || '').toString().trim();
				          return !isOff && !!shift;
				        }
				        return !isOff;
				      }).length;
				      const perSa = getTargetPerSaTodayValue();
				      if (!perSa) {
				        el.textContent = `Target / SA Today: -- (${working} SA working)`;
				        return;
				      }
		      const weekNum = storeMetrics?.retailWeek?.weekNumber;
		      const weekLabel = weekNum ? `Retail Week ${weekNum} · ` : '';
			      el.textContent = `${weekLabel}Target / SA Today: ${formatCurrency(perSa)} (${working} SA working)`;
			    }

			    function getWeekKeyFromMetrics() {
			      const rw = storeMetrics?.retailWeek;
			      const weekNumber = rw?.weekNumber;
			      const weekStart = (rw?.weekStart || '').toString();
			      const year = /^\d{4}-\d{2}-\d{2}$/.test(weekStart) ? weekStart.slice(0, 4) : '';
			      const wk = Number(weekNumber);
			      if (!year || !Number.isFinite(wk)) return null;
			      return `${year}-W${String(wk).padStart(2, '0')}`;
			    }

			    function clampPercent(n) {
			      const num = Number(n);
			      if (!Number.isFinite(num)) return 0;
			      return Math.max(0, Math.min(MAX_WEEKLY_DAY_PERCENT, Math.round(num)));
			    }

			    function getWeeklyTargetValue() {
			      const rw = storeMetrics?.retailWeek || null;
			      const weekly = Number(rw?.target || 0);
			      return Number.isFinite(weekly) && weekly > 0 ? weekly : null;
			    }

          async function loadWeeklyGoalDistribution() {
			      const weekKey = getWeekKeyFromMetrics();
			      weeklyGoalDistribution.weekKey = weekKey;
			      if (!weekKey) return;
			      try {
              const resp = await authFetch(`/api/gameplan/weekly-goal-distribution/${encodeURIComponent(weekKey)}`);
			        if (!resp.ok) return;
			        const data = await resp.json();
			        if (data?.weekKey === weekKey && Array.isArray(data?.percents) && data.percents.length === 7) {
			          weeklyGoalDistribution = {
			            weekKey,
			            enabled: data.enabled === true || data.enabled === 'true',
			            percents: data.percents.map(clampPercent),
			            updatedAt: data.updatedAt || null,
			            updatedBy: data.updatedBy || null
			          };
			        }
			      } catch (_) {}
			    }

			    function renderWeeklyGoalDistribution() {
			      const grid = document.getElementById('weeklyGoalGrid');
			      const enabledEl = document.getElementById('weeklyGoalEnabled');
			      const totalEl = document.getElementById('weeklyGoalTotal');
			      const metaEl = document.getElementById('weeklyGoalMeta');
			      if (!grid || !enabledEl || !totalEl || !metaEl) return;

			      const weekKey = weeklyGoalDistribution?.weekKey;
			      const weeklyTarget = getWeeklyTargetValue();
			      const weekNum = storeMetrics?.retailWeek?.weekNumber;
			      const weekLabel = weekNum ? `Retail Week ${weekNum}` : 'Retail Week';
			      const updatedAt = weeklyGoalDistribution?.updatedAt ? new Date(weeklyGoalDistribution.updatedAt).toLocaleString() : '';
			      const updatedBy = (weeklyGoalDistribution?.updatedBy || '').toString().trim();
			      const metaParts = [];
			      metaParts.push(weekKey ? `${weekLabel} (${weekKey})` : weekLabel);
			      metaParts.push(weeklyTarget ? `Weekly target: ${formatCurrency(weeklyTarget)}` : 'Weekly target: --');
			      if (updatedAt || updatedBy) metaParts.push(`Saved ${updatedAt}${updatedBy ? ` by ${updatedBy}` : ''}`);
			      metaEl.textContent = metaParts.join(' · ');

			      enabledEl.checked = !!weeklyGoalDistribution?.enabled;

			      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
			      grid.innerHTML = '';
			      const percents = (weeklyGoalDistribution?.percents || []).slice(0, 7).map(clampPercent);
			      while (percents.length < 7) percents.push(0);

			      percents.forEach((pct, idx) => {
			        const dollars = weeklyTarget ? (weeklyTarget * (pct / 100)) : null;
			        const row = document.createElement('div');
			        row.style.display = 'contents';
			        row.innerHTML = `
			          <div style="font-weight:600;">${days[idx]}</div>
                <div class="weekly-goal-slider-wrap">
                  <button type="button" class="weekly-goal-step-btn" data-weekly-goal-step="dec" data-day-index="${idx}" ${enabledEl.checked ? '' : 'disabled'} aria-label="Decrease ${days[idx]} percent">−</button>
			            <input type="range" min="0" max="${MAX_WEEKLY_DAY_PERCENT}" step="1" value="${pct}" data-day-index="${idx}" class="weekly-goal-slider" ${enabledEl.checked ? '' : 'disabled'}>
                  <button type="button" class="weekly-goal-step-btn" data-weekly-goal-step="inc" data-day-index="${idx}" ${enabledEl.checked ? '' : 'disabled'} aria-label="Increase ${days[idx]} percent">+</button>
                </div>
			          <div style="text-align:right; font-variant-numeric: tabular-nums;"><span class="weekly-goal-pct" data-day-index="${idx}">${pct}</span>%</div>
			          <div style="text-align:right; font-variant-numeric: tabular-nums;">${weeklyTarget ? formatCurrency(dollars) : '--'}</div>
			        `;
			        grid.appendChild(row);
			      });

			      const total = percents.reduce((a, b) => a + b, 0);
			      totalEl.textContent = `${total}%`;
			      totalEl.style.color = total === 100 ? 'inherit' : 'var(--danger)';
			    }

			    function normalizeWeeklyPercents() {
			      const p = (weeklyGoalDistribution?.percents || []).slice(0, 7).map(clampPercent);
			      while (p.length < 7) p.push(0);

            // Clamp to allowed range first.
            for (let i = 0; i < 7; i++) p[i] = clampPercent(p[i]);

            let total = p.reduce((a, b) => a + b, 0);

            // If total is low, fill (prefer later days first).
            if (total < 100) {
              let remaining = 100 - total;
              for (let i = 6; i >= 0 && remaining > 0; i--) {
                const capacity = MAX_WEEKLY_DAY_PERCENT - p[i];
                if (capacity <= 0) continue;
                const add = Math.min(capacity, remaining);
                p[i] += add;
                remaining -= add;
              }
              total = p.reduce((a, b) => a + b, 0);
            }

            // If total is high, subtract (prefer later days first).
            if (total > 100) {
              let excess = total - 100;
              for (let i = 6; i >= 0 && excess > 0; i--) {
                const canRemove = p[i];
                if (canRemove <= 0) continue;
                const sub = Math.min(canRemove, excess);
                p[i] -= sub;
                excess -= sub;
              }
            }

			      weeklyGoalDistribution.percents = p;
			      renderWeeklyGoalDistribution();
			      updateTargetPerSaInfo();
			    }

          async function loadNotesTemplates() {
            try {
	            const resp = await authFetch('/api/gameplan/notes-templates');
              if (!resp.ok) return;
              const data = await resp.json();
              notesTemplates = Array.isArray(data?.templates) ? data.templates : [];
              renderNotesTemplateSelect();
            } catch (_) {}
          }

          function renderNotesTemplateSelect() {
            const select = document.getElementById('notesTemplateSelect');
            if (!select) return;
            const prev = select.value || '';
            select.innerHTML = `<option value="">Notes templates…</option>`;
            notesTemplates
              .slice()
              .sort((a, b) => (a?.name || '').localeCompare(b?.name || ''))
              .forEach(t => {
                if (!t?.id) return;
                const name = (t.name || 'Untitled').toString();
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = name;
                select.appendChild(opt);
              });
            if (prev && notesTemplates.some(t => t?.id === prev)) select.value = prev;

            const has = !!select.value;
            const applyBtn = document.getElementById('applyNotesTemplateBtn');
            const delBtn = document.getElementById('deleteNotesTemplateBtn');
            if (applyBtn) applyBtn.disabled = !has;
            if (delBtn) delBtn.disabled = !has;
          }

          async function saveWeeklyGoalDistribution() {
			      const weekKey = weeklyGoalDistribution?.weekKey;
			      if (!weekKey) {
			        alert('No retail week loaded yet.');
			        return;
			      }
			      const percents = (weeklyGoalDistribution?.percents || []).slice(0, 7).map(clampPercent);
			      const total = percents.reduce((a, b) => a + b, 0);
			      if (total !== 100) {
			        alert(`Daily % must total 100%. Current total: ${total}%`);
			        return;
			      }
            try {
              const resp = await authFetch(`/api/gameplan/weekly-goal-distribution/${encodeURIComponent(weekKey)}`, {
			          method: 'POST',
			          headers: { 'Content-Type': 'application/json' },
			          body: JSON.stringify({ enabled: !!weeklyGoalDistribution.enabled, percents })
              });
			        if (!resp.ok) {
			          let msg = `Save failed (HTTP ${resp.status})`;
			          try {
			            const data = await resp.json();
			            if (data?.error) msg = data.error;
			          } catch (_) {}
			          throw new Error(msg);
			        }
			        const saved = await resp.json();
			        weeklyGoalDistribution.enabled = saved.enabled === true || saved.enabled === 'true';
			        weeklyGoalDistribution.percents = (saved.percents || percents).map(clampPercent);
			        weeklyGoalDistribution.updatedAt = saved.updatedAt || null;
			        weeklyGoalDistribution.updatedBy = saved.updatedBy || null;
			        renderWeeklyGoalDistribution();
			        updateTargetPerSaInfo();
			      } catch (e) {
			        alert(e?.message || 'Failed to save weekly goal distribution');
			      }
			    }

		    document.addEventListener('DOMContentLoaded', async () => {
	      // Section expand/collapse logic
	      document.querySelectorAll('.section-toggle').forEach(title => {
	        const btn = title.querySelector('.toggle-btn');
	        const section = title.closest('section');
	        if (!btn || !section) return;
	        btn.textContent = section.classList.contains('collapsed-section') ? '▸' : '▾';
	        btn.addEventListener('click', () => {
	          section.classList.toggle('collapsed-section');
	          btn.textContent = section.classList.contains('collapsed-section') ? '▸' : '▾';
	        });
	      });

		      // Always wire core UI (even if data load fails)
		      setupEventListeners();

		      // Weekly goal distribution controls
		      if (!document.weeklyGoalBindings) {
		        document.weeklyGoalBindings = true;
		        document.getElementById('weeklyGoalEnabled')?.addEventListener('change', (e) => {
		          weeklyGoalDistribution.enabled = !!e.target.checked;
		          renderWeeklyGoalDistribution();
		          updateTargetPerSaInfo();
		        });
		        document.getElementById('weeklyGoalNormalizeBtn')?.addEventListener('click', () => {
		          normalizeWeeklyPercents();
		        });
		        document.getElementById('weeklyGoalSaveBtn')?.addEventListener('click', () => {
		          saveWeeklyGoalDistribution();
		        });
		        document.addEventListener('input', (e) => {
		          const slider = e.target?.closest?.('.weekly-goal-slider');
		          if (!slider) return;
		          const idx = Number(slider.dataset.dayIndex);
		          if (!Number.isFinite(idx) || idx < 0 || idx > 6) return;
		          const p = (weeklyGoalDistribution?.percents || []).slice(0, 7).map(clampPercent);
		          while (p.length < 7) p.push(0);
		          p[idx] = clampPercent(slider.value);
		          weeklyGoalDistribution.percents = p;
		          renderWeeklyGoalDistribution();
		          updateTargetPerSaInfo();
		        });
		      }

				      try {
				        editLog('[EDIT] Starting initialization...');
				        await checkAuth();
				        editLog('[EDIT] Auth complete, loading data...');
			        await loadData();
			        editLog('[EDIT] Data loaded:', { employees, settings });
			        renderAll();
			        startDayRolloverWatcher();
			        editLog('[EDIT] Render complete');
			        editLog('[EDIT] UI ready');
			      } catch (error) {
			        console.error('[EDIT] Initialization error:', error);
			      }
		    });

    async function checkAuth() {
      try {
        SharedHeader.mountHeader({ showRefresh: false });
        await SharedHeader.init();
        currentUser = SharedHeader.currentUser;

          if (!currentUser) {
            window.location.href = '/login';
            return;
          }

          if (!currentUser.isManager && !currentUser.isAdmin) {
            alert('Access denied. Managers only.');
            window.location.href = '/home';
            return;
          }

          const now = new Date();
          const dateEl = document.getElementById('currentDate');
          if (dateEl) {
            dateEl.textContent = now.toLocaleDateString('en-US', {
              weekday: 'long',
              year: 'numeric',
              month: 'long',
              day: 'numeric'
            });
          }
      } catch (error) {
        console.error('Auth check failed:', error);
        window.location.href = '/login';
      }
    }

            async function loadData() {
					      editLog('[EDIT] loadData starting...');
					      const storeDay = await getStoreDayInfo();
					      const clientDate = storeDay?.date || getLocalISODate(); // YYYY-MM-DD (store day)
					      currentStoreDayInfo = storeDay;
					      currentEditorDate = clientDate;
                const [empRes, settingsRes, gpRes, metricsRes, storeCfgRes] = await Promise.all([
                  authFetch('/api/gameplan/employees'),
                  authFetch('/api/gameplan/settings'),
                  authFetch(`/api/gameplan/date/${clientDate}`),
                authFetch('/api/gameplan/metrics'),
                authFetch('/api/gameplan/store-config')
              ]);

			      const empData = await empRes.json();
	      editLog('[EDIT] Raw employee response:', empData);
			      employees = empData.employees || { SA: [], BOH: [], MANAGEMENT: [], TAILOR: [] };
		      editLog('[EDIT] Employees after parse:', employees);
			      settings = await settingsRes.json();
		      editLog('[EDIT] Settings:', settings);
			      gameplanData = gpRes.ok ? await gpRes.json() : { date: clientDate, notes: '', assignments: {} };
			      storeMetrics = metricsRes.ok ? await metricsRes.json() : {};
			      storeConfig = storeCfgRes.ok ? await storeCfgRes.json() : storeConfig;
            await loadNotesTemplates();

			      await loadWeeklyGoalDistribution();
			      renderWeeklyGoalDistribution();

	      // Load notes into editor
	      const notesEditor = document.getElementById('notesEditor');
	      if (notesEditor && gameplanData.notes) {
	        notesEditor.innerHTML = gameplanData.notes;
	      }
      
	      // Update last edited by
	      if (gameplanData.lastEditedBy) {

		      if (!gameplanData.assignments || Object.keys(gameplanData.assignments).length === 0) {
		        resetEditorForNewDay();
		      }

		      for (const type of Object.keys(employees)) {

	          const zones = Array.isArray(emp.zones)
            ? emp.zones.map(z => (z || '').toString().trim()).filter(Boolean)
            : ((emp.zone || '').toString().trim() ? [(emp.zone || '').toString().trim()] : []);

          const fittingRoom = Array.isArray(emp.fittingRoom)
            ? (emp.fittingRoom[0] || '').toString().trim()
            : (emp.fittingRoom || '').toString().trim();

          const closingSections = Array.isArray(emp.closingSections)
            ? emp.closingSections.map(s => (s || '').toString().trim()).filter(Boolean)
            : ((emp.closingSections || '').toString().trim()
              ? (emp.closingSections || '').toString().split(',').map(s => s.trim()).filter(Boolean)
              : []);

	          return {
	            ...emp,
	            zones,
	            zone: zones[0] || '',
	            fittingRoom,
	            closingSections
	          };
	        });
	      }

			      updateTargetPerSaInfo();

    function collectAllChanges() {
      const assignments = {};

      document.querySelectorAll('.edit-card').forEach(card => {
        const id = card.dataset.id;
        const type = card.dataset.type;
        const fields = {};

        // Collect regular fields
        card.querySelectorAll('[data-field]').forEach(el => {
          const field = el.dataset.field;

          if (field === 'closingSections') {
            // Handle duty chips
            const selected = [];
            el.querySelectorAll('.duty-chip.selected').forEach(chip => {
              selected.push(chip.dataset.duty);
            });
            fields[field] = selected;
          } else if (field === 'zones') {
            const selected = [];
            el.querySelectorAll('.zone-chip.selected').forEach(chip => {
              selected.push(chip.dataset.zone);
            });
            fields[field] = selected;
          } else if (field === 'isOff') {
            // Persist as boolean (strings like "false" break `!!emp.isOff` on reload).
            fields[field] = String(el.value).toLowerCase() === 'true';
          } else if (el.tagName === 'SELECT' || el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
            fields[field] = el.value;
          }
        });

        if (Object.keys(fields).length > 0) {
          assignments[id] = { ...fields, type };
        }
      });

      return assignments;
    }

	    function addAssignmentValidation(container) {
	      // Use event delegation on the document to handle fitting room changes
	      // This only attaches once and works for dynamically created selects
	      if (document.validationSetup) return; // Prevent duplicate setup
	      
	      document.addEventListener('change', function(e) {
	        const select = e.target;
	        // Only process fitting room selects (zones can be shared)
	        if (!select.matches('select[data-field="fittingRoom"]')) {
	          return;
	        }
	        const value = select.value;
	        const field = select.dataset.field;
	        const currentCard = select.closest('.edit-card');
	        if (!currentCard || !value) return; // Allow clearing the selection
	        if (currentCard.classList.contains('off')) return;
	        const empId = currentCard.dataset.id;
	        const currentEmp = findEmployeeById(empId);
	        const prevValue = currentEmp?.fittingRoom || '';
	        if (currentEmp) currentEmp.fittingRoom = value;
	        // Check if this value is already assigned to another employee
	        const allCards = document.querySelectorAll('.edit-card');
	        for (const card of allCards) {
	          if (card === currentCard) continue; // Skip current employee
	          const otherSelect = card.querySelector(`select[data-field="${field}"]`);
	          if (otherSelect && otherSelect.value === value) {
	            const otherEmpName = card.querySelector('h4')?.textContent;
	            const fieldLabel = 'Fitting Room';
	            alert(`⚠️ ${fieldLabel} "${value}" is already assigned to ${otherEmpName}.\n\nPlease select a different ${fieldLabel.toLowerCase()}.`);
	            // Reset to previous value
	            select.value = prevValue;
	            if (currentEmp) currentEmp.fittingRoom = prevValue;
	            return;
	          }
	        }
	        hasUnsavedChanges = true;
	        // Re-render Sales Associates to update taken/available states
	        if (typeof renderSA === 'function') setTimeout(renderSA, 0);
	      });

	      // Keep employee model in sync for all basic inputs/selects
	      document.addEventListener('change', function(e) {
	        const el = e.target;
	        const field = el?.dataset?.field;
	        if (!field) return;
	        if (field === 'closingSections' || field === 'zones') return; // handled by chip click handlers
	        const card = el.closest('.edit-card');
	        if (!card) return;
	        if (card.classList.contains('off')) return;
	        const emp = findEmployeeById(card.dataset.id);
	        if (!emp) return;
	        if (el.tagName === 'SELECT' || el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
	          emp[field] = el.value;
	          hasUnsavedChanges = true;
	        }
	      });

	      // Zones toggle (multi-select)
	      document.addEventListener('click', function(e) {
	        const zoneChip = e.target.closest('.zone-chip');
	        if (!zoneChip) return;
	        const card = zoneChip.closest('.edit-card');
	        if (!card) return;
	        if (card.classList.contains('off')) return;
	        const emp = findEmployeeById(card.dataset.id);
	        if (!emp) return;

	        const zoneName = zoneChip.dataset.zone;
	        const zones = Array.isArray(emp.zones) ? [...emp.zones] : [];
	        const idx = zones.indexOf(zoneName);
	        if (idx >= 0) zones.splice(idx, 1);
	        else zones.push(zoneName);
	        emp.zones = zones;
	        emp.zone = zones[0] || '';
	        hasUnsavedChanges = true;

	        // Re-render so taken/available duties stays accurate if other changes happen
	        if (typeof renderSA === 'function') setTimeout(renderSA, 0);
	      });
	      
	      // Handle closing duties validation
	      document.addEventListener('click', function(e) {
	        const dutyChip = e.target.closest('.duty-chip');
	        if (!dutyChip) return;

	        const dutyName = dutyChip.dataset.duty;
	        const currentCard = dutyChip.closest('.edit-card');
	        
	        if (!currentCard) return;
	        if (currentCard.classList.contains('off')) return;

	        const currentEmp = findEmployeeById(currentCard.dataset.id);
	        if (!currentEmp) return;

	        const currentSelected = Array.isArray(currentEmp.closingSections) ? currentEmp.closingSections : [];
	        const isSelecting = !currentSelected.includes(dutyName);

	        if (isSelecting) {
	          // Check if this duty is already assigned to another employee
	          const otherAssignee = []
	            .concat(employees.SA || [])
	            .concat(employees.MANAGEMENT || [])
	            .concat(employees.BOH || [])
	            .find(e => e.id !== currentEmp.id && Array.isArray(e.closingSections) && e.closingSections.includes(dutyName));
	          if (otherAssignee) {
	            alert(`⚠️ Closing Duty "${dutyName}" is already assigned to ${otherAssignee.name}.\n\nPlease select a different duty.`);
	            return;
	          }
	        }

	        // Update model
	        if (isSelecting) {
	          currentEmp.closingSections = [...currentSelected, dutyName];
	        } else {
	          currentEmp.closingSections = currentSelected.filter(d => d !== dutyName);
	        }
	        hasUnsavedChanges = true;
	        // Re-render so other employees show Taken/Available immediately
	        setTimeout(() => {
	          if (typeof renderSA === 'function') renderSA();
	          if (typeof renderBOH === 'function') renderBOH();
	          if (typeof renderManagement === 'function') renderManagement();
	        }, 0);
	      });
	      
	      document.validationSetup = true;
	    }

    function validateAssignments(assignments) {
      const errors = [];
      const fittingRoomMap = new Map();

      // Collect fitting room assignments
      Object.keys(assignments).forEach(empId => {
        const assignment = assignments[empId];
        const empName = getEmployeeName(empId);

        if (assignment.isOff === true || assignment.isOff === 'true') return;

        if (assignment.fittingRoom && assignment.fittingRoom !== '') {
          if (fittingRoomMap.has(assignment.fittingRoom)) {
            errors.push(`Fitting Room "${assignment.fittingRoom}" is assigned to both ${fittingRoomMap.get(assignment.fittingRoom)} and ${empName}`);
          } else {
	            fittingRoomMap.set(assignment.fittingRoom, empName);
	          }
	        }
	      });

      return errors;
    }

	    function getEmployeeName(empId) {
	      for (const type of ['SA', 'MANAGEMENT', 'BOH', 'TAILOR']) {
	        const typeEmps = employees[type] || [];
	        const emp = typeEmps.find(e => e.id === empId);
	        if (emp) return emp.name;
	      }
	      return empId;
	    }

    async function saveAllChanges() {
      const saveBtn = document.getElementById('saveAllBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Publishing...';
      
      const assignments = collectAllChanges();
      
      // Validate for duplicate assignments
      const validationErrors = validateAssignments(assignments);
	      if (validationErrors.length > 0) {
	        alert('Cannot save due to conflicts:\n\n' + validationErrors.join('\n'));
	        saveBtn.disabled = false;
	        saveBtn.textContent = 'Publish';
	        return;
	      }

	      // Required fields: anyone marked In-Store must have a shift (or station for tailors).
	      const missingRequired = [];
		      (employees.SA || []).forEach(e => {
		        if (e?.isOff) return;
		        if (storeConfig?.requireSaShift && !(e?.shift || '').toString().trim()) missingRequired.push(`${e.name} (SA shift)`);
		      });
	      (employees.BOH || []).forEach(e => {
	        if (e?.isOff) return;
	        if (!(e?.shift || '').toString().trim()) missingRequired.push(`${e.name} (BOH shift)`);
	      });
	      (employees.MANAGEMENT || []).forEach(e => {
	        if (e?.isOff) return;
	        if (!(e?.shift || '').toString().trim()) missingRequired.push(`${e.name} (Manager shift)`);
	      });
		      // Tailors can be left blank for now (no required fields enforced).
		      if (missingRequired.length) {
		        alert('To publish, everyone marked In-Store needs required fields:\n\n' + missingRequired.join('\n'));
		        saveBtn.disabled = false;
		        saveBtn.textContent = 'Publish';
		        return;
		      }
	      
	      // Get notes from editor
	      const notesEditor = document.getElementById('notesEditor');
	      const notes = notesEditor ? notesEditor.innerHTML : '';

      gameplanData.assignments = assignments;
      gameplanData.notes = notes;
      // Use local date (store day) to avoid UTC off-by-one issues
      gameplanData.date = getLocalISODate();
      gameplanData.lastEditedBy = currentUser.name;
      gameplanData.lastEditedAt = new Date().toISOString();

	      try {
	        const response = await authFetch('/api/gameplan/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(gameplanData)
        });

        if (response.ok) {
          saveBtn.textContent = '✓ Published!';
          saveBtn.style.background = 'var(--success)';
          hasUnsavedChanges = false;
          
          // Redirect to dashboard with client date after 1 second
          setTimeout(() => {
            const clientDate = getLocalISODate(); // YYYY-MM-DD format
            window.location.href = `/dashboard?date=${clientDate}`;
          }, 1000);
        } else {
          let msg = `Save failed (HTTP ${response.status})`;
          try {
            const data = await response.json();
            if (data?.error) msg = data.error;
          } catch (e) {}
          throw new Error(msg);
        }
      } catch (error) {
        alert(error?.message || 'Error saving changes');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Publish';
      }
    }

	    function setupEventListeners() {
	      if (document.editListenersSetup) return;
	      document.editListenersSetup = true;

	      document.getElementById('saveAllBtn')?.addEventListener('click', saveAllChanges);
	      
	      // Setup real-time validation for zone and fitting room (once at startup)
	      addAssignmentValidation(document);
	      
		      // Clear All button
			      document.getElementById('clearAllBtn')?.addEventListener('click', () => {
			        if (confirm('Are you sure you want to clear all assignments? This cannot be undone.')) {
		          // Reset all employees data
		          ['SA', 'MANAGEMENT', 'BOH', 'TAILOR'].forEach(role => {
		            (employees[role] || []).forEach(emp => {
		              // Only clear daily-editable fields (avoid nuking metrics/productivity objects)
		              // Mark everyone as Day Off
		              emp.isOff = true;
		              emp.zones = [];
		              emp.zone = '';
		              emp.fittingRoom = '';
		              emp.scheduledLunch = '';
		              emp.closingSections = [];
		              emp.shift = '';
		              emp.lunch = '';
		              emp.taskOfTheDay = '';
	              emp.role = '';
	              emp.station = '';
	            });
	          });
	
	          // Clear notes
	          const notesEditor = document.getElementById('notesEditor');
	          if (notesEditor) notesEditor.innerHTML = '';
	          gameplanData.notes = '';
	          gameplanData.assignments = {};

	          hasUnsavedChanges = true;
	          updateTargetPerSaInfo();
	          if (typeof renderSA === 'function') setTimeout(renderSA, 0);
	          if (typeof renderBOH === 'function') setTimeout(renderBOH, 0);
	          if (typeof renderTailors === 'function') setTimeout(renderTailors, 0);
	          if (typeof renderManagement === 'function') setTimeout(renderManagement, 0);
	        }
	      });

      // Track changes
      document.addEventListener('change', (e) => {
        if (e.target.closest('.edit-card')) {
          hasUnsavedChanges = true;
        }
      });

	      // Day Off toggle (real-time reorder + disable)
		      document.addEventListener('change', (e) => {
		        const toggle = e.target?.closest?.('input[data-action="toggleOff"]');
		        if (!toggle) return;
		        const card = toggle.closest('.edit-card');
		        if (!card) return;

		        const empId = card.dataset.id;
		        const emp = findEmployeeById(empId);
		        if (!emp) return;
	
          // Toggle input is "On duty" when checked.
	        const nextIsOff = !toggle.checked;
	        emp.isOff = nextIsOff;
	        if (nextIsOff) {
	          // When someone is OFF, clear any daily assignments so they don't appear scheduled.
	          clearDailyAssignmentFields(emp);
	        }
		        hasUnsavedChanges = true;
		        updateTargetPerSaInfo();
		
		        // Re-render all sections to move OFF to bottom and gray out
		        if (typeof renderAll === 'function') setTimeout(renderAll, 0);
		      });

        // Weekly goal +/- buttons (mobile-friendly 1% steps)
        document.addEventListener('click', (e) => {
          const btn = e.target?.closest?.('button[data-weekly-goal-step]');
          if (!btn) return;
          if (!weeklyGoalDistribution?.enabled) return;

          const idx = Number(btn.dataset.dayIndex);
          if (!Number.isFinite(idx) || idx < 0 || idx > 6) return;
          const step = btn.dataset.weeklyGoalStep;
          const delta = step === 'inc' ? 1 : step === 'dec' ? -1 : 0;
          if (!delta) return;

          const p = (weeklyGoalDistribution?.percents || []).slice(0, 7).map(clampPercent);
          while (p.length < 7) p.push(0);

          p[idx] = clampPercent(p[idx] + delta);
          weeklyGoalDistribution.percents = p;
          renderWeeklyGoalDistribution();
          updateTargetPerSaInfo();
        });

      // Warn before leaving with unsaved changes
      window.addEventListener('beforeunload', (e) => {
        if (hasUnsavedChanges) {
          e.preventDefault();
          e.returnValue = '';
        }
      });
      
	      // Notes editor event listeners
	      setupNotesEditor();
        setupNotesTemplates();
	      setupCopyFromYesterdayModal();
	    }

      function setupNotesTemplates() {
        if (document.notesTemplatesSetup) return;
        document.notesTemplatesSetup = true;

        const select = document.getElementById('notesTemplateSelect');
        const applyBtn = document.getElementById('applyNotesTemplateBtn');
        const saveBtn = document.getElementById('saveNotesTemplateBtn');
        const delBtn = document.getElementById('deleteNotesTemplateBtn');
        const notesEditor = document.getElementById('notesEditor');
        if (!select || !applyBtn || !saveBtn || !delBtn || !notesEditor) return;

        select.addEventListener('change', () => {
          const has = !!select.value;
          applyBtn.disabled = !has;
          delBtn.disabled = !has;
        });

        applyBtn.addEventListener('click', () => {
          const id = select.value;
          const tmpl = notesTemplates.find(t => t?.id === id);
          if (!tmpl) return;
          if (!confirm(`Apply template "${tmpl.name}"? This will replace the current notes.`)) return;
          notesEditor.innerHTML = (tmpl.html || '').toString();
          hasUnsavedChanges = true;
        });

        saveBtn.addEventListener('click', async () => {
          const currentHtml = (notesEditor.innerHTML || '').toString();
          const selectedId = select.value || '';
          const selected = selectedId ? notesTemplates.find(t => t?.id === selectedId) : null;
          const defaultName = selected?.name || '';
          const name = prompt('Template name:', defaultName);
          if (!name) return;

          let mode = 'create';
          let targetId = null;
          if (selected && name.trim() === (selected.name || '').toString().trim()) {
            mode = confirm(`Update existing template "${selected.name}"?`) ? 'update' : 'create';
            targetId = selected.id;
          }

	          try {
	            const resp = await authFetch(
              mode === 'update' ? `/api/gameplan/notes-templates/${encodeURIComponent(targetId)}` : '/api/gameplan/notes-templates',
              {
                method: mode === 'update' ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name.trim(), html: currentHtml })
              }
            );
            if (!resp.ok) {
              let msg = `Save failed (HTTP ${resp.status})`;
              try {
                const data = await resp.json();
                if (data?.error) msg = data.error;
              } catch (_) {}
              throw new Error(msg);
            }
            await loadNotesTemplates();
            // Re-select by name (best-effort)
            const match = notesTemplates.find(t => (t?.name || '').toString().trim() === name.trim());
            if (match?.id) select.value = match.id;
            applyBtn.disabled = !select.value;
            delBtn.disabled = !select.value;
          } catch (e) {
            alert(e?.message || 'Failed to save template');
          }
        });

        delBtn.addEventListener('click', async () => {
          const id = select.value;
          const tmpl = notesTemplates.find(t => t?.id === id);
          if (!tmpl) return;
          if (!confirm(`Delete template "${tmpl.name}"?`)) return;
            try {
              const resp = await authFetch(`/api/gameplan/notes-templates/${encodeURIComponent(id)}`, { method: 'DELETE' });
            if (!resp.ok) {
              let msg = `Delete failed (HTTP ${resp.status})`;
              try {
                const data = await resp.json();
                if (data?.error) msg = data.error;
              } catch (_) {}
              throw new Error(msg);
            }
            await loadNotesTemplates();
            select.value = '';
            applyBtn.disabled = true;
            delBtn.disabled = true;
          } catch (e) {
            alert(e?.message || 'Failed to delete template');
          }
        });
      }

	    function setupCopyFromYesterdayModal() {
	      if (document.copyModalSetup) return;
	      document.copyModalSetup = true;

	      const copyModalOverlay = document.getElementById('copyModalOverlay');
	      const cancelCopyBtn = document.getElementById('cancelCopyBtn');
	      const confirmCopyBtn = document.getElementById('confirmCopyBtn');
	      const selectAllFields = document.getElementById('selectAllFields');
	      const copyFields = document.querySelectorAll('.copy-field');
	      const copyBtn = document.getElementById('copyYesterdayBtn');

	      if (!copyModalOverlay || !copyBtn) {
		        editWarn('[EDIT] Copy modal elements missing', {
		          copyModalOverlay: !!copyModalOverlay,
		          copyYesterdayBtn: !!copyBtn
		        });
	        return;
	      }

	      function saveCopyPreferences() {
	        const selected = Array.from(copyFields).filter(cb => cb.checked).map(cb => cb.value);
	        localStorage.setItem('copyFieldPrefs', JSON.stringify(selected));
	        if (selectAllFields) selectAllFields.checked = selected.length === copyFields.length;
	      }

	      function loadSavedCopyPreferences() {
	        const saved = localStorage.getItem('copyFieldPrefs');
	        if (saved) {
	          const selected = JSON.parse(saved);
	          copyFields.forEach(cb => cb.checked = selected.includes(cb.value));
	          if (selectAllFields) selectAllFields.checked = selected.length === copyFields.length;
	        }
	      }

		      async function copyFromYesterdayFields() {
		        try {
		          const selectedFields = ['closingSections'];

		          const params = new URLSearchParams(window.location.search);
		          const copyDate = params.get('copyDate');
		          const storeDay = await getStoreDayInfo();
		          const todayIso = storeDay?.date || getLocalISODate();
		          const storeYesterday = (() => {
		            const d = new Date(`${todayIso}T12:00:00Z`);
		            d.setUTCDate(d.getUTCDate() - 1);
		            return d.toISOString().slice(0, 10);
		          })();
		          const url = copyDate ? `/api/gameplan/date/${copyDate}` : `/api/gameplan/date/${storeYesterday}`;

			          editLog('[EDIT] Copy from date:', copyDate || storeYesterday, '->', url);
                const response = await authFetch(url);
			          if (!response.ok) {
			            editWarn('[EDIT] Copy fetch failed', response.status);
			            alert('No game plan found for yesterday.');
			            return;
			          }

			          const data = await response.json();
			          editLog('[EDIT] Copy payload keys:', Object.keys(data || {}));
			          copyFieldsToEmployees(data, selectedFields);
		          copyModalOverlay.classList.remove('show');
		          hasUnsavedChanges = true;
		          alert('Closing duties copied!');
		        } catch (error) {
		          console.error('Error copying:', error);
		          alert('Error loading yesterday plan.');
		        }
		      }

	      function copyFieldsToEmployees(yesterdayData, fieldsToCopy) {
	        // Support both payloads:
	        // - /api/gameplan/yesterday -> { employees: [...], notes }
	        // - /api/gameplan/date/:date -> { assignments: { [id]: {...} }, notes }
	        const yEmployees = yesterdayData.employees
	          ? yesterdayData.employees
	          : Object.keys(yesterdayData.assignments || {}).map(id => ({ id, ...(yesterdayData.assignments[id] || {}) }));

	        if (!Array.isArray(yEmployees) || yEmployees.length === 0) return;

	        // Notes
	        if (fieldsToCopy.includes('notes')) {
	          const notesEditor = document.getElementById('notesEditor');
	          if (notesEditor) notesEditor.innerHTML = yesterdayData.notes || '';
	        }

	        yEmployees.forEach(yEmp => {
	          let found = null;
	          ['SA', 'MANAGEMENT', 'BOH', 'TAILOR'].forEach(role => {
	            if (!found) found = (employees[role] || []).find(e => e.id === yEmp.id);
	          });
	          if (!found) return;

	          fieldsToCopy.forEach(field => {
	            if (field === 'notes') return;

	            if (field === 'zones') {
	              const z = Array.isArray(yEmp.zones)
	                ? yEmp.zones
	                : ((yEmp.zone || '').toString().trim() ? [yEmp.zone] : []);
	              found.zones = z.map(v => (v || '').toString().trim()).filter(Boolean);
	              found.zone = found.zones[0] || '';
	              return;
	            }

		            if (field === 'closingSections') {
		              const cs = Array.isArray(yEmp.closingSections)
		                ? yEmp.closingSections
		                : ((yEmp.closingSections || '').toString().trim()
		                  ? (yEmp.closingSections || '').toString().split(',').map(s => s.trim()).filter(Boolean)
		                  : []);
		              found.closingSections = cs;
		              return;
		            }

		            if (field === 'lunch') {
		              const val = yEmp.scheduledLunch ?? yEmp.lunch ?? '';
		              if (found.type === 'SA') found.scheduledLunch = val;
		              else found.lunch = val;
	              return;
	            }

	            if (!yEmp.hasOwnProperty(field)) return;
	            found[field] = Array.isArray(yEmp[field]) ? [...yEmp[field]] : yEmp[field];
	          });
	        });

	        if (typeof renderSA === 'function') renderSA();
	        if (typeof renderBOH === 'function') renderBOH();
	        if (typeof renderTailors === 'function') renderTailors();
	        if (typeof renderManagement === 'function') renderManagement();
	      }

		      // Use event delegation so the button always works even if something re-renders
		      document.addEventListener('click', (e) => {
	        const openBtn = e.target.closest('#copyYesterdayBtn');
	        if (openBtn) {
	          e.preventDefault();
	          e.stopPropagation();
		          editLog('[EDIT] Opening Copy from Yesterday modal');
		          copyModalOverlay.classList.add('show');
		          return;
		        }

	        const cancelBtn = e.target.closest('#cancelCopyBtn');
	        if (cancelBtn) {
	          e.preventDefault();
	          copyModalOverlay.classList.remove('show');
	          return;
	        }

	        const confirmBtn = e.target.closest('#confirmCopyBtn');
	        if (confirmBtn) {
	          e.preventDefault();
	          copyFromYesterdayFields();
	          return;
	        }

	        if (e.target === copyModalOverlay) {
	          copyModalOverlay.classList.remove('show');
	        }
	      });

		      // No-op: selectAllFields hidden in UI
		    }
    
    // ===== Rich Text Notes Editor =====
	    function setupNotesEditor() {
	      const notesEditor = document.getElementById('notesEditor');
	      const emojiBtn = document.getElementById('emojiBtn');
	      
	      if (!notesEditor) return;
      
      // Toolbar button commands
      document.querySelectorAll('.notes-toolbar button[data-cmd]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const cmd = btn.dataset.cmd;
          document.execCommand(cmd, false, null);
          notesEditor.focus();
          hasUnsavedChanges = true;
        });
      });
      
      // Font size selector
      const fontSizeSelect = document.getElementById('fontSizeSelect');
      if (fontSizeSelect) {
        fontSizeSelect.addEventListener('change', (e) => {
          document.execCommand('fontSize', false, e.target.value);
          notesEditor.focus();
          hasUnsavedChanges = true;
        });
      }
      
      // Font family selector
      const fontNameSelect = document.getElementById('fontNameSelect');
      if (fontNameSelect) {
        fontNameSelect.addEventListener('change', (e) => {
          document.execCommand('fontName', false, e.target.value);
          notesEditor.focus();
          hasUnsavedChanges = true;
        });
      }
      
      // Text color picker
      const textColorPicker = document.getElementById('textColorPicker');
      if (textColorPicker) {
        textColorPicker.addEventListener('input', (e) => {
          document.execCommand('foreColor', false, e.target.value);
          notesEditor.focus();
          hasUnsavedChanges = true;
        });
      }
      
      // Background/highlight color picker
      const bgColorPicker = document.getElementById('bgColorPicker');
      if (bgColorPicker) {
        bgColorPicker.addEventListener('input', (e) => {
          document.execCommand('hiliteColor', false, e.target.value);
          notesEditor.focus();
          hasUnsavedChanges = true;
        });
      }
      
      // Emoji picker toggle
      if (emojiBtn) {
        emojiBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          // Simple emoji insertion
          const emojis = ['😀', '👍', '🎯', '✅', '⚠️', '📝', '💼', '👔', '🛍️', '⭐', '🔥', '💪', '📊', '📈', '🏆'];
          const emoji = prompt('Pick emoji (or paste your own):\\n' + emojis.join(' '));
          if (emoji) {
            document.execCommand('insertText', false, emoji);
            notesEditor.focus();
            hasUnsavedChanges = true;
          }
        });
      }
      
      // Track notes changes
      notesEditor.addEventListener('input', () => {
        hasUnsavedChanges = true;
      });

      // Collapsible notes card
      const notesCardHeader = document.getElementById('notesCardHeader');
      const notesCard = document.getElementById('notesCard');
      const notesToggle = document.querySelector('#notesCard .notes-card-toggle');
      if (notesCardHeader) {
        notesCardHeader.addEventListener('click', () => {
          notesCard.classList.toggle('collapsed');
          if (notesToggle) notesToggle.textContent = notesCard.classList.contains('collapsed') ? '▸' : '▾';
        });
      }

	    }
  </script>
