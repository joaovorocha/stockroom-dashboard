<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <title>Lost Punch - Daily Game Plan | San Francisco</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stockroom">
  <link rel="stylesheet" href="/css/theme.css?v=14">
  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <link rel="stylesheet" href="/css/dashboard.css?v=17">
  <link rel="stylesheet" href="/css/mobile.css?v=3">
  <style>
    .punch-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px;
    }
    .punch-tabs .tab {
      padding: 10px 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      border-radius: 6px 6px 0 0;
    }
    .punch-tabs .tab.active {
      background: var(--primary);
      color: #fff;
    }
    .punch-form {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }
    .punch-card {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .punch-card.approved {
      border-color: var(--success);
    }
    .punch-card.pending {
      border-color: #ffc107;
    }
    .punch-card.denied {
      border-color: var(--danger);
    }
    .punch-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .punch-date {
      font-weight: 600;
    }
    .punch-status {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    .punch-status.approved { background: var(--success); color: #fff; }
    .punch-status.pending { background: #ffc107; color: #000; }
    .punch-status.denied { background: var(--danger); color: #fff; }
    .punch-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      font-size: 13px;
    }
    .punch-details label {
      color: var(--text-muted);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <!-- Shared Header Mount -->
  <div id="shared-header-mount"></div>
<div class="dashboard-layout" style="grid-template-columns: 1fr;">
  <main class="main-content">
                <div class="form-group">
                  <label>Clock Out (optional)</label>
                  <input type="time" class="form-control" id="clockOutTime">
                </div>
              </div>

              <div class="form-group">
                <label>Reason *</label>
                <textarea class="form-control" id="reason" rows="3" required placeholder="Explain why you missed your punch..."></textarea>
              </div>

              <button type="submit" class="btn btn-primary">Submit Lost Punch</button>
            </form>
          </div>
        </div>

        <!-- History Tab -->
        <div id="historyTab" class="tab-content" style="display:none;">
          <h3 style="margin-bottom: 16px;">Your Lost Punch Requests</h3>
          <div id="historyList"></div>
        </div>

        <!-- Review Tab (Managers Only) -->
        <div id="reviewTabContent" class="tab-content" style="display:none;">
          <h3 style="margin-bottom: 16px;">Pending Requests for Review</h3>
          <div id="reviewList"></div>
        </div>
      </section>
    </main>
  </div>

  <footer class="footer">
    <p>Daily Game Plan - San Francisco | Developed by Victor Rocha | 831-998-3808</p>
  </footer>

 <script>
    let currentUser = null;
    let punches = [];
    function canManageClient(user) {
      const role = (user?.role || '').toString().toUpperCase();
      return !!(user?.isAdmin || user?.isManager || role === 'MANAGEMENT');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
      await loadPunches();
      setupEventListeners();
    });

	    async function checkAuth() {
	      try {
	        const response = await fetch('/api/auth/check', { credentials: 'include' });
	        const data = await response.json();
	        if (data.authenticated) {
	          currentUser = data.user;
	          document.getElementById('userName').textContent = currentUser.name || 'User';
	          if (currentUser.imageUrl) {
	            const img = document.getElementById('userAvatar');
	            if (img) {
	              img.src = currentUser.imageUrl;
	              img.style.display = 'block';
	            }
	          }
	          document.getElementById('employeeName').value = currentUser.name || '';
	          document.getElementById('employeeId').value = currentUser.employeeId || '';

	          // Toggle review tab for managers/admins
	          if (currentUser.isManager || currentUser.isAdmin || (currentUser.role || '').toString().toUpperCase() === 'MANAGEMENT') {
	            const reviewTabBtn = document.getElementById('reviewTab');
	            if (reviewTabBtn) reviewTabBtn.style.display = 'inline-block';
	          }

	          // Toggle admin nav
	          if (currentUser.isAdmin) {
	            const adminNav = document.getElementById('navAdmin');
	            if (adminNav) adminNav.style.display = 'inline';
	          }
	        } else {
	          window.location.href = '/login';
	        }
	      } catch (e) {}
	    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }

	    async function loadPunches() {
	      try {
	        const response = await fetch('/api/lost-punch', { credentials: 'include' });
	        if (!response.ok) throw new Error(`HTTP ${response.status}`);
	        punches = await response.json();
	        renderHistory();
	        renderReview();
	      } catch (e) {
	        punches = [];
	      }
	    }

    function renderTimesHtml(p) {
      const timeRows = [
        { label: 'Clock In', value: p.clockInTime },
        { label: 'Lunch Out', value: p.lunchOutTime },
        { label: 'Lunch In', value: p.lunchInTime },
        { label: 'Clock Out', value: p.clockOutTime },
      ].filter(r => r.value);

      if (timeRows.length === 0 && p.missedTime) {
        timeRows.push({ label: 'Time', value: p.missedTime });
      }

      if (timeRows.length === 0) {
        return '<div><label>Times</label><br>-</div>';
      }

      return timeRows.map(r => `<div><label>${r.label}</label><br>${r.value}</div>`).join('');
    }

	    function renderHistory() {
	      const container = document.getElementById('historyList');
	      const myEmpId = (currentUser?.employeeId || '').toString().trim();
	      const myUserId = (currentUser?.userId || currentUser?.id || '').toString().trim();
	      const canManage = canManageClient(currentUser);
	      const myPunches = !currentUser
	        ? []
	        : (canManage ? punches.filter(p => {
	            const pid = (p.employeeId || '').toString().trim();
	            const puid = (p.employeeUserId || '').toString().trim();
	            return (myEmpId && pid === myEmpId) || (myUserId && puid === myUserId);
	          }) : punches);

      if (!myPunches.length) {
        container.innerHTML = '<p style="color: var(--text-muted);">No lost punch requests found.</p>';
        return;
      }

      container.innerHTML = myPunches.map(p => `
        <div class="punch-card ${p.status}">
          <div class="punch-header">
            <span class="punch-date">${new Date(p.missedDate).toLocaleDateString()}</span>
            <span class="punch-status ${p.status}">${p.status}</span>
          </div>
          <div class="punch-details">
            ${renderTimesHtml(p)}
          </div>
          <p style="margin-top: 8px; font-size: 13px; color: var(--text-secondary);">${p.reason}</p>
	          ${p.reviewedBy ? `
	            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted);">
	              <strong>${p.status === 'approved' ? 'Approved' : 'Reviewed'}</strong> by ${p.reviewedBy}
	              ${p.reviewedAt ? ' on ' + new Date(p.reviewedAt).toLocaleDateString() + ' at ' + new Date(p.reviewedAt).toLocaleTimeString() : ''}
	            </div>
	          ` : ''}
	        </div>
	      `).join('');
	    }

	    function renderReview() {
	      const container = document.getElementById('reviewList');
	      const pendingPunches = punches.filter(p => (p.status || '').toString().toLowerCase() === 'pending');

	      if (!pendingPunches.length) {
	        container.innerHTML = '<p style="color: var(--text-muted);">Nothing to review.</p>';
	        return;
	      }

	      let html = '';

	      if (pendingPunches.length) {
	        html += `
	          <h4 style="margin: 8px 0 12px;">Pending</h4>
	          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 12px; background: var(--surface); border-radius: 6px;">
	            <label style="display: flex; align-items: center; gap: 8px;">
	              <input type="checkbox" id="selectAllPending" onchange="toggleSelectAll('pending')">
	              <span>Select All (${pendingPunches.length})</span>
	            </label>
	            <div style="display: flex; gap: 8px;">
	              <button class="btn btn-sm btn-secondary" onclick="approveAllPending()">Approve All</button>
	              <button class="btn btn-sm btn-primary" onclick="batchApprove()">Approve Selected</button>
	              <button class="btn btn-sm btn-danger" onclick="batchDeny()">Deny Selected</button>
	            </div>
	          </div>
	        `;
	      }

	      html += pendingPunches.map(p => `
	        <div class="punch-card pending">
	          <div class="punch-header">
	            <label style="display: flex; align-items: center; gap: 8px;">
	              <input type="checkbox" class="punch-checkbox punch-checkbox-pending" value="${p.id}">
	              <span class="punch-date">${p.employeeName} - ${new Date(p.missedDate).toLocaleDateString()}</span>
	            </label>
	            <span class="punch-status pending">Pending</span>
	          </div>
          <div class="punch-details">
            ${renderTimesHtml(p)}
            <div><label>Submitted</label><br>${p.submittedAt ? new Date(p.submittedAt).toLocaleDateString() : '-'}</div>
          </div>
          <p style="margin-top: 8px; font-size: 13px;">${p.reason}</p>
          <div style="margin-top: 12px; display: flex; gap: 8px;">
            <button class="btn btn-sm btn-primary" onclick="approvePunch('${p.id}')">Approve</button>
            <button class="btn btn-sm btn-danger" onclick="denyPunch('${p.id}')">Deny</button>
          </div>
	        </div>
	      `).join('');

	      container.innerHTML = html;
	    }

	    function toggleSelectAll(type) {
	      const selectAll = document.getElementById('selectAllPending');
	      const selector = '.punch-checkbox-pending';
	      document.querySelectorAll(selector).forEach(cb => {
	        cb.checked = !!selectAll?.checked;
	      });
	    }

	    function getSelectedPunchIds(type) {
	      const selector = '.punch-checkbox-pending:checked';
	      return Array.from(document.querySelectorAll(selector)).map(cb => cb.value);
	    }

	    async function approveAllPending() {
	      const ids = punches
	        .filter(p => (p.status || '').toString().toLowerCase() === 'pending')
	        .map(p => p.id);
	      if (ids.length === 0) {
	        alert('No pending punches to approve');
	        return;
	      }
	      if (!confirm(`Approve all ${ids.length} pending punch(es)?`)) return;
	      await batchUpdate(ids, 'approved');
	    }

	    async function batchApprove() {
	      const ids = getSelectedPunchIds('pending');
	      if (ids.length === 0) {
	        alert('Please select at least one punch to approve');
	        return;
	      }
	      if (!confirm(`Approve ${ids.length} punch(es)?`)) return;
	      await batchUpdate(ids, 'approved');
	    }

	    async function batchDeny() {
	      const ids = getSelectedPunchIds('pending');
	      if (ids.length === 0) {
	        alert('Please select at least one punch to deny');
	        return;
	      }
	      if (!confirm(`Deny ${ids.length} punch(es)?`)) return;
	      await batchUpdate(ids, 'denied');
	    }

	    async function batchUpdate(ids, status) {
	      try {
	        await fetch('/api/lost-punch/batch', {
	          method: 'POST',
	          headers: { 'Content-Type': 'application/json' },
	          credentials: 'include',
	          body: JSON.stringify({ ids, status, reviewedBy: currentUser?.name })
	        });
	        await loadPunches();
	        alert(`${ids.length} punch(es) ${status} successfully!`);
	      } catch (e) {
	        alert('Error updating punches');
	      }
	    }

    async function approvePunch(id) {
      await updatePunchStatus(id, 'approved');
    }

    async function denyPunch(id) {
      await updatePunchStatus(id, 'denied');
    }

	    async function updatePunchStatus(id, status) {
	      try {
	        await fetch(`/api/lost-punch/${id}`, {
	          method: 'PATCH',
	          headers: { 'Content-Type': 'application/json' },
	          credentials: 'include',
	          body: JSON.stringify({ status, reviewedBy: currentUser?.name })
	        });
	        await loadPunches();
	      } catch (e) {
	        alert('Error updating status');
	      }
	    }

    function setupEventListeners() {
      // Tabs
      document.querySelectorAll('.punch-tabs .tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.punch-tabs .tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
          const tabId = tab.dataset.tab === 'review' ? 'reviewTabContent' : tab.dataset.tab + 'Tab';
          document.getElementById(tabId).style.display = 'block';
        });
      });

      // Form submit
      document.getElementById('punchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const clockInTime = document.getElementById('clockInTime').value;
        const lunchOutTime = document.getElementById('lunchOutTime').value;
        const lunchInTime = document.getElementById('lunchInTime').value;
        const clockOutTime = document.getElementById('clockOutTime').value;

        const hasAtLeastOneTime = !!(clockInTime || lunchOutTime || lunchInTime || clockOutTime);
        if (!hasAtLeastOneTime) {
          alert('Please enter at least one time (Clock In, Lunch Out, Lunch In, or Clock Out).');
          return;
        }

        const punch = {
          employeeName: document.getElementById('employeeName').value,
          employeeId: document.getElementById('employeeId').value,
          missedDate: document.getElementById('missedDate').value,
          clockInTime,
          lunchOutTime,
          lunchInTime,
          clockOutTime,
          reason: document.getElementById('reason').value,
          status: 'pending',
          submittedAt: new Date().toISOString()
        };

	        try {
	          await fetch('/api/lost-punch', {
	            method: 'POST',
	            headers: { 'Content-Type': 'application/json' },
	            credentials: 'include',
	            body: JSON.stringify(punch)
	          });
	          alert('Lost punch submitted successfully!');
          document.getElementById('punchForm').reset();
          if (currentUser) {
            document.getElementById('employeeName').value = currentUser.name;
            document.getElementById('employeeId').value = currentUser.employeeId;
          }
          await loadPunches();
        } catch (e) {
          alert('Error submitting lost punch');
        }
      });
    }
  </script>
  <script src="/js/shared-header.js?v=22"></script>
</body>
</html>
