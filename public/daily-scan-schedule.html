<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daily Scan Schedule | Suitsupply</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="/css/theme.css?v=14">
  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <link rel="stylesheet" href="/css/dashboard.css?v=17">
  <style>
    .schedule-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    .schedule-form {
      background: var(--surface);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 200px 1fr 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-group input,
    .form-group select {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      min-height: 44px;
    }

    .schedule-table {
      width: 100%;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .schedule-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .schedule-table th {
      background: var(--background);
      padding: 12px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
    }

    .schedule-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .schedule-table tr:hover {
      background: var(--background);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 44px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      padding: 6px 12px;
      font-size: 12px;
      min-height: 32px;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-scheduled {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-executed {
      background: #d1fae5;
      color: #065f46;
    }

    .status-missed {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-completed-other {
      background: #fef3c7;
      color: #92400e;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .schedule-table {
        overflow-x: auto;
      }

      .schedule-table table {
        min-width: 600px;
      }
    }
  </style>
</head>
<body>
  <div id="shared-header-mount"></div>

  <main class="schedule-container">
    <header style="margin-bottom: 32px;">
      <h1 style="margin: 0 0 8px 0; font-size: 28px; font-weight: 700;">📅 Daily Scan Schedule</h1>
      <p style="margin: 0; color: var(--text-secondary); font-size: 16px;">Assign employees to daily scan tasks</p>
    </header>

    <!-- Schedule Form -->
    <section class="schedule-form">
      <h3 style="margin: 0 0 20px 0; font-size: 18px; font-weight: 600;">Create New Assignment</h3>
      <div class="form-grid">
        <div class="form-group">
          <label for="scanDate">Date</label>
          <input type="date" id="scanDate" required>
        </div>
        <div class="form-group">
          <label for="employee">Assigned Employee</label>
          <select id="employee" required>
            <option value="">Select employee...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="notes">Notes (Optional)</label>
          <input type="text" id="notes" placeholder="Add notes...">
        </div>
        <div class="form-group">
          <button class="btn btn-primary" id="scheduleBtn">Schedule</button>
        </div>
      </div>
      <div id="scheduleStatus" style="margin-top: 12px; font-size: 14px; color: var(--text-secondary);"></div>
    </section>

    <!-- Scheduled Scans Table -->
    <section class="schedule-table">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Assigned Employee</th>
            <th>Status</th>
            <th>Actual Employee</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="scheduleTableBody">
          <tr>
            <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);">
              Loading schedules...
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="/js/shared-header.js?v=24"></script>
  <script src="/js/daily-scan-schedule.js?v=1"></script>
</body>
</html>
