<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <title>Work-Related Expenses | Suitsupply</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stockroom">
  <link rel="stylesheet" href="/css/theme.css?v=14">
  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <link rel="stylesheet" href="/css/dashboard.css?v=17">
  <style>
    .page-wrap { max-width: 1600px; margin: 0 auto; padding: 18px 18px 42px; }
    .subheader { display:flex; align-items:center; justify-content:space-between; gap:12px; margin: 14px 0 16px; }
    .subheader h2 { margin:0; font-size: 18px; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
    .field { display:flex; flex-direction:column; gap:4px; }
    .field label { font-size: 12px; color: var(--text-secondary); }
    .field input, .field select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); }
    .summary-row { display:flex; gap: 12px; flex-wrap:wrap; margin-bottom: 14px; }
    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; min-width: 220px; }
    .summary-card .label { font-size: 12px; color: var(--text-secondary); }
    .summary-card .value { font-size: 22px; font-weight: 700; margin-top: 6px; }
    .summary-card .hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .banner { display:none; background: rgba(220, 38, 38, 0.08); border: 1px solid rgba(220, 38, 38, 0.3); color: var(--text); padding: 10px 12px; border-radius: 10px; margin: 10px 0 14px; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align:left; font-size: 12px; padding: 10px 12px; color: var(--text-secondary); background: var(--background); border-bottom: 1px solid var(--border); }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tbody tr:hover { background: rgba(0,0,0,0.03); }
    .pill { display:inline-flex; align-items:center; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); background: var(--background); font-size: 12px; color: var(--text-secondary); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .actions { display:flex; gap:8px; align-items:center; }
    .btn-sm { padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--background); cursor:pointer; font-size: 12px; color: var(--text); }
    .btn-sm:hover { background: var(--surface); }
    .right { text-align:right; }
    @media (max-width: 700px) { .right { text-align:left; } }
  </style>
</head>
<body>
  <div id="sharedHeader"></div>

  <div class="page-wrap">
    <div class="subheader">
      <h2>Work-Related Expenses (Employee Discounts)</h2>
      <div class="filters">
        <div class="field">
          <label for="rangeSelect">Range</label>
          <select id="rangeSelect">
            <option value="ytd">Year to date</option>
            <option value="month">This month</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="field">
          <label for="startDate">Start</label>
          <input type="date" id="startDate">
        </div>
        <div class="field">
          <label for="endDate">End</label>
          <input type="date" id="endDate">
        </div>
        <div class="field" id="employeeFilterField" style="display:none;">
          <label for="employeeSelect">Employee</label>
          <select id="employeeSelect"></select>
        </div>
        <button class="btn-sm" id="applyBtn">Apply</button>
      </div>
    </div>

    <div class="banner" id="limitBanner"></div>

    <div class="summary-row">
      <div class="summary-card">
        <div class="label">My Discount Total (Selected Range)</div>
        <div class="value" id="myTotal">--</div>
        <div class="hint" id="myTotalHint">--</div>
      </div>
      <div class="summary-card">
        <div class="label">My Limit</div>
        <div class="value" id="myLimit">--</div>
        <div class="hint">Set by admin</div>
      </div>
      <div class="summary-card">
        <div class="label">Store Discount Total (Selected Range)</div>
        <div class="value" id="storeTotal">--</div>
        <div class="hint" id="storeTotalHint">--</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Employee</th>
            <th>Customer</th>
            <th>Reason</th>
            <th class="right">Discount (LC)</th>
            <th class="right">Full Price (LC)</th>
            <th>Order</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>

  <script src="/js/shared-header.js?v=22"></script>
  <script src="/js/expenses.js?v=1"></script>
</body>
</html>
