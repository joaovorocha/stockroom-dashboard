<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <title>Radio Admin</title>
  <link rel="stylesheet" href="/css/theme.css?v=14">
  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <style>
    .radio-admin-wrap { max-width: 800px; margin: 30px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 24px; }
    .radio-admin-title { font-size: 1.5em; font-weight: 600; margin-bottom: 18px; }
    .radio-admin-section { margin-bottom: 24px; }
    .radio-admin-label { font-weight: 500; margin-bottom: 6px; display: block; }
    .radio-admin-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #2563eb; background: #2563eb; color: #fff; font-size: 1em; cursor:pointer; }
    .radio-admin-btn:disabled { background: #aaa; border-color: #aaa; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <a href="/home" class="logo-link">
        <img src="/images/suitsupply-logo.svg" alt="Suitsupply" class="logo-img" onerror="this.outerHTML='<span class=\\'logo-text\\'>SUITSUPPLY</span>'">
      </a>
      <div class="header-title">
        <h1>Radio Admin</h1>
        <span class="location">San Francisco</span>
      </div>
    </div>
    <nav class="header-nav">
      <a href="/dashboard" id="navGamePlan">Game Plan</a>
      <a href="/operations-metrics" id="navOperationsMetrics">Operations</a>
      <a href="/awards" id="navAwards">Awards</a>
      <a href="/expenses" id="navExpenses">Expenses <span class="nav-badge" id="expensesBadge" style="display:none;">0</span></a>
      <a href="/radio-transcripts" id="navRadioTranscripts">Radio Transcripts</a>
      <a href="/shipments" id="navShipments">Shipments <span class="nav-badge" id="shipmentsBadge" style="display:none;">0</span></a>
      <a href="/scanner" id="navScanner">Scanner</a>
      <a href="/lost-punch" id="navLostPunch">Lost Punch</a>
      <a href="/closing-duties" id="navClosingDuties">Closing Duties</a>
      <a href="/time-off" id="navTimeOff">Time Off</a>
      <a href="/ops-dashboard" id="navOpsDashboard">Looker Dashboards</a>
      <a href="/admin" id="navAdmin" style="display:none;">Admin</a>
    </nav>
    <div class="header-actions">
      <div class="header-date">
        <span id="currentDate"></span>
      </div>
      <div class="header-user" id="userMenu">
        <img src="data:," alt="" id="userAvatar" class="user-avatar-img" onerror="this.style.display='none'">
        <span id="userName">Guest</span>
        <div class="user-dropdown" id="userDropdown">
          <a href="#" id="logoutBtn">Logout</a>
        </div>
      </div>
    </div>
  </header>
  <div class="radio-admin-wrap">
    <div class="radio-admin-title">Radio Admin Panel</div>
    <div class="radio-admin-section">
      <div class="radio-admin-label">Radio Service Controls</div>
      <button class="radio-admin-btn" onclick="alert('Start/Stop radio service coming soon!')">Start/Stop Radio Service</button>
    </div>
    <div class="radio-admin-section">
      <div class="radio-admin-label">Transcripts Management</div>
      <button class="radio-admin-btn" onclick="alert('Export transcripts coming soon!')">Export Transcripts</button>
    </div>
    <div class="radio-admin-section">
      <div class="radio-admin-label">Configuration</div>
      <button class="radio-admin-btn" onclick="alert('Edit config coming soon!')">Edit Radio Config</button>
    </div>
  </div>
  <script src="/js/shared-header.js?v=22"></script>
</body>
</html>
