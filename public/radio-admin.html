<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <title>Radio Admin</title>
  <link rel="stylesheet" href="/css/theme.css?v=14">
  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <style>
    .radio-admin-wrap { max-width: 800px; margin: 30px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 24px; }
    .radio-admin-title { font-size: 1.5em; font-weight: 600; margin-bottom: 18px; }
    .radio-admin-section { margin-bottom: 24px; }
    .radio-admin-label { font-weight: 500; margin-bottom: 6px; display: block; }
    .radio-admin-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #2563eb; background: #2563eb; color: #fff; font-size: 1em; cursor:pointer; }
    .radio-admin-btn:disabled { background: #aaa; border-color: #aaa; }
  </style>
</head>
<body>
  <!-- Shared Header Mount -->
  <div id="shared-header-mount"></div>
<div class="radio-admin-wrap">
    <div class="radio-admin-title">Radio Admin Panel</div>
    <div class="radio-admin-section">
      <div class="radio-admin-label">Radio Service Controls</div>
      <button class="radio-admin-btn" onclick="alert('Start/Stop radio service coming soon!')">Start/Stop Radio Service</button>
    </div>
    <div class="radio-admin-section">
      <div class="radio-admin-label">Transcripts Management</div>
      <button class="radio-admin-btn" onclick="alert('Export transcripts coming soon!')">Export Transcripts</button>
    </div>
    <div class="radio-admin-section">
      <div class="radio-admin-label">Configuration</div>
      <button class="radio-admin-btn" onclick="alert('Edit config coming soon!')">Edit Radio Config</button>
    </div>
  </div>
  <script src="/js/shared-header.js?v=22"></script>
</body>
</html>
