<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Time Off Calendar - San Francisco | Suitsupply</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stockroom">
  <link rel="stylesheet" href="/css/theme.css?v=14">
  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <style>
    .timeoff-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      background: var(--background);
      border-bottom: 1px solid var(--border);
    }

    .timeoff-container {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .calendar-section {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .calendar-nav button {
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: var(--background);
      cursor: pointer;
      border-radius: 4px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-day-header {
      padding: 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .calendar-day {
      min-height: 100px;
      padding: 8px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .calendar-day:nth-child(7n) {
      border-right: none;
    }

    .calendar-day.other-month {
      background: var(--surface);
      opacity: 0.5;
    }

    .calendar-day.today {
      background: #e3f2fd;
    }

    .day-number {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .timeoff-event {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: opacity 0.2s;
      color: white;
      font-weight: 500;
    }

    .timeoff-event:hover {
      opacity: 0.8;
    }

    /* Event detail modal */
    .event-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .event-modal.active {
      display: flex;
    }
    .event-modal-content {
      background: var(--background);
      border-radius: 8px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .event-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .event-modal-header h3 {
      margin: 0;
    }
    .event-modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .event-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .event-detail-row:last-child {
      border-bottom: none;
    }
    .event-detail-label {
      color: var(--text-secondary);
      font-size: 13px;
    }
    .event-detail-value {
      font-weight: 500;
    }

    .legend {
      display: flex;
      gap: 16px;
      padding: 12px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }
    .legend-dot.approved { background: #d4edda; border: 1px solid #155724; }
    .legend-dot.denied { background: #f8d7da; border: 1px solid #721c24; }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .request-card {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .request-card h3 {
      margin-bottom: 16px;
      font-size: 16px;
    }

    .pending-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .pending-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: var(--surface);
      border-radius: 4px;
    }

    .pending-info {
      flex: 1;
    }

    .pending-info .name {
      font-weight: 500;
      margin-bottom: 2px;
    }

    .pending-info .dates {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .pending-actions {
      display: flex;
      gap: 4px;
    }

    .pending-actions button {
      padding: 4px 8px;
      font-size: 11px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 360px;
      overflow-y: auto;
    }

    .history-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 10px 12px;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .pill.pending { background: #fff3cd; color: #856404; }
    .pill.approved { background: #d4edda; color: #155724; }
    .pill.denied { background: #f8d7da; color: #721c24; }
    .pill.done { background: #e0f2fe; color: #075985; }

    .processed-by {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .processed-by img {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      object-fit: cover;
    }

    .manager-table-card {
      grid-column: 1 / -1;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .manager-table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .table-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .table-controls input, .table-controls select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--background);
    }

    .manager-table-wrap {
      overflow: auto;
      max-height: 520px;
    }

    table.manager-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 980px;
    }

    table.manager-table th, table.manager-table td {
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    table.manager-table th {
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 5;
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .cell-wrap { white-space: normal; max-width: 340px; }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }

	    @media (max-width: 1024px) {
	      .timeoff-container {
	        grid-template-columns: 1fr;
	      }
	    }

		    /* Phone layout: make the month grid fit the screen */
		    @media (max-width: 768px) {
		      .timeoff-container {
		        padding: 10px;
		        gap: 12px;
		      }

	      .calendar-header {
	        padding: 10px 12px;
	      }

	      .calendar-nav button {
	        padding: 6px 10px;
	      }

	      #currentMonth {
	        font-size: 16px;
	        margin: 0;
	      }

		      .calendar-section {
		        /* Keep the full month visible without stretching each day cell */
		        display: block;
		      }

		      .calendar-grid {
		        grid-template-rows: 26px repeat(6, 56px);
		      }

	      .calendar-day-header {
	        padding: 6px 0;
	        font-size: 10px;
	      }

		      .calendar-day {
		        min-height: 0;
		        padding: 4px;
		        overflow: hidden;
		      }

	      .day-number {
	        font-size: 12px;
	        margin-bottom: 2px;
	      }

	      .timeoff-event {
	        font-size: 9px;
	        padding: 1px 4px;
	        margin-bottom: 1px;
	      }
	    }
	  </style>
</head>
<body>
  <!-- Shared Header Mount -->
  <div id="shared-header-mount"></div>
<div class="timeoff-header">
	    <h2 style="margin: 0; font-size: 20px;">Time Off</h2>
	  </div>

	  <div class="timeoff-container">
	    <div class="calendar-section">
	      <div class="calendar-header">
        <div class="calendar-nav">
          <button id="prevMonth">&larr;</button>
          <button id="nextMonth">&rarr;</button>
        </div>
        <h2 id="currentMonth">December 2025</h2>
        <button class="btn btn-sm btn-primary" id="todayBtn">Today</button>
      </div>
      <div class="calendar-grid" id="calendarGrid">
        <div class="calendar-day-header">Sun</div>
        <div class="calendar-day-header">Mon</div>
        <div class="calendar-day-header">Tue</div>
        <div class="calendar-day-header">Wed</div>
        <div class="calendar-day-header">Thu</div>
        <div class="calendar-day-header">Fri</div>
        <div class="calendar-day-header">Sat</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="request-card">
        <h3>Request Time Off</h3>
        <form id="requestForm">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" class="form-control" id="startDate" required>
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="date" class="form-control" id="endDate" required>
          </div>
          <div class="form-group">
            <label>Reason</label>
            <select class="form-control" id="reason">
              <option value="vacation">Vacation</option>
              <option value="sick">Sick Leave</option>
              <option value="personal">Personal</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Notes (optional)</label>
            <textarea class="form-control" id="notes" rows="2"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Publish Time Off</button>
        </form>
        <p style="font-size: 12px; color: var(--text-secondary); margin-top: 12px; text-align: center;">
          This is for public view only. You still need to submit your time off request on Workday.
        </p>
      </div>

      <!-- History removed: edit/delete happens from calendar event details -->
    </div>
  </div>

  <!-- Event Detail Modal -->
  <div class="event-modal" id="eventModal">
    <div class="event-modal-content">
      <div class="event-modal-header">
        <h3>Time Off Details</h3>
        <button class="event-modal-close" onclick="closeEventModal()">&times;</button>
      </div>
      <div id="eventModalBody"></div>
    </div>
  </div>

  <!-- Edit Entry Modal (employee) -->
  <div class="event-modal" id="editEntryModal">
    <div class="event-modal-content">
      <div class="event-modal-header">
        <h3>Edit Time Off</h3>
        <button class="event-modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <div id="editEntryBody">
        <input type="hidden" id="editEntryId">
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" class="form-control" id="editStartDate" required>
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input type="date" class="form-control" id="editEndDate" required>
        </div>
        <div class="form-group">
          <label>Reason</label>
          <select class="form-control" id="editReason">
            <option value="vacation">Vacation</option>
            <option value="sick">Sick Leave</option>
            <option value="personal">Personal</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes (optional)</label>
          <textarea class="form-control" id="editNotes" rows="2"></textarea>
        </div>
        <div style="display:flex; gap: 10px; justify-content: flex-end; margin-top: 12px;">
          <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
          <button class="btn btn-primary" id="saveEditBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>Daily Game Plan - San Francisco | Developed by Victor Rocha | 831-998-3808</p>
  </footer>

  <script>
    let allEvents = []; // Store all events for modal lookup
    let currentUser = null;
    let currentDate = new Date();
    let timeOffData = { entries: [], myEntries: [] };

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getEmployeeColor(employeeId) {
      const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9'];
      let hash = 0;
      for (let i = 0; i < employeeId.length; i++) {
        hash = employeeId.charCodeAt(i) + ((hash << 5) - hash);
      }
      return colors[Math.abs(hash) % colors.length];
    }

    async function checkAuth() {
      const response = await fetch('/api/auth/check', { credentials: 'include' });
      const data = await response.json();
      if (!data.authenticated) {
        window.location.href = '/login';
        return;
      }
      currentUser = {
        ...data.user,
        userId: data.user?.userId || data.user?.id || ''
      };
      document.getElementById('userName').textContent = data.user.name;
      if (data.user.imageUrl) {
        const img = document.getElementById('userAvatar');
        if (img) {
          img.src = data.user.imageUrl;
          img.style.display = 'block';
        }
      }
    }

    async function loadTimeOffData() {
      try {
        const response = await fetch('/api/timeoff', { credentials: 'include' });
        if (response.ok) {
          timeOffData = await response.json();

          // Safety: always derive myEntries client-side (prevents mismatches if API/session changed).
          const entries = Array.isArray(timeOffData.entries) ? timeOffData.entries : [];
          const myEmpId = (currentUser?.employeeId || '').toString().trim();
          const myUserId = (currentUser?.userId || '').toString().trim().toLowerCase();
          let computedMyEntries = entries.filter(e => {
            const entryUserId = (e?.employeeUserId || e?.employeeUserID || '').toString().trim().toLowerCase();
            if (myUserId && entryUserId && entryUserId === myUserId) return true;
            const entryEmpId = (e?.employeeId || '').toString().trim();
            return myEmpId && entryEmpId && entryEmpId === myEmpId;
          });
          // Fallback: if ids don't match (legacy sessions), match by name as a last resort.
          if (!computedMyEntries.length) {
            const myName = (currentUser?.name || '').toString().trim().toLowerCase();
            if (myName) {
              computedMyEntries = entries.filter(e => (e?.employeeName || '').toString().trim().toLowerCase() === myName);
            }
          }
          timeOffData.myEntries = computedMyEntries;

          renderCalendar();
        }
      } catch (error) {
        console.error('Error loading time off data:', error);
      }
    }

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      // Keep headers
      grid.innerHTML = `
        <div class="calendar-day-header">Sun</div>
        <div class="calendar-day-header">Mon</div>
        <div class="calendar-day-header">Tue</div>
        <div class="calendar-day-header">Wed</div>
        <div class="calendar-day-header">Thu</div>
        <div class="calendar-day-header">Fri</div>
        <div class="calendar-day-header">Sat</div>
      `;

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('currentMonth').textContent =
        currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startPadding = firstDay.getDay();
      const totalDays = lastDay.getDate();

      const today = new Date();

      // Combine all events
      allEvents = timeOffData.entries || [];

      // Previous month padding
      const prevLastDay = new Date(year, month, 0).getDate();
      for (let i = startPadding - 1; i >= 0; i--) {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day other-month';
        dayEl.innerHTML = `<span class="day-number">${prevLastDay - i}</span>`;
        grid.appendChild(dayEl);
      }

      // Current month days
      for (let day = 1; day <= totalDays; day++) {
        const dayEl = document.createElement('div');
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

        const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
        dayEl.className = `calendar-day ${isToday ? 'today' : ''}`;

        let eventsHtml = '';

        const dayEvents = allEvents.filter(event => {
          const start = new Date(event.startDate);
          const end = new Date(event.endDate);
          const current = new Date(dateStr);

          return current >= start && current <= end;
        }).sort((a, b) => {
          const an = (a.employeeName || '').toString().toLowerCase();
          const bn = (b.employeeName || '').toString().toLowerCase();
          if (an < bn) return -1;
          if (an > bn) return 1;
          return (a.employeeId || '').toString().localeCompare((b.employeeId || '').toString());
        });

        dayEvents.forEach(event => {
          const color = getEmployeeColor(event.employeeId);
          eventsHtml += `<div class="timeoff-event" style="background-color: ${color};" data-event-id="${escapeHtml(event.id)}">${escapeHtml(event.employeeName || 'Unknown')}</div>`;
        });

        dayEl.innerHTML = `
          <span class="day-number">${day}</span>
          ${eventsHtml}
        `;
        grid.appendChild(dayEl);
      }

      // Next month padding
      const endPadding = 42 - (startPadding + totalDays);
      for (let i = 1; i <= endPadding; i++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day other-month';
        dayEl.innerHTML = `<span class="day-number">${i}</span>`;
        grid.appendChild(dayEl);
      }
    }

    function showEventDetails(eventId) {
      const event = allEvents.find(e => e.id === eventId);
      if (!event) return;

      const modalBody = document.getElementById('eventModalBody');

      const startDate = new Date(event.startDate).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      const endDate = new Date(event.endDate).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

      const myEmpId = (currentUser?.employeeId || '').toString().trim();
      const myUserId = (currentUser?.userId || '').toString().trim().toLowerCase();
      const entryUserId = (event?.employeeUserId || '').toString().trim().toLowerCase();
      const isOwner = (!!myUserId && !!entryUserId && myUserId === entryUserId) || (!!myEmpId && (event.employeeId || '').toString().trim() === myEmpId);
      const canEdit = !!(currentUser?.isAdmin || isOwner);

      modalBody.innerHTML = `
        <div class="event-detail-row">
          <span class="event-detail-label">Employee</span>
          <span class="event-detail-value">${escapeHtml(event.employeeName || 'Unknown')}</span>
        </div>
        <div class="event-detail-row">
          <span class="event-detail-label">Start Date</span>
          <span class="event-detail-value">${escapeHtml(startDate)}</span>
        </div>
        <div class="event-detail-row">
          <span class="event-detail-label">End Date</span>
          <span class="event-detail-value">${escapeHtml(endDate)}</span>
        </div>
        <div class="event-detail-row">
          <span class="event-detail-label">Reason</span>
          <span class="event-detail-value">${escapeHtml(event.reason || 'Not specified')}</span>
        </div>
	        ${event.notes ? `
	          <div class="event-detail-row">
	            <span class="event-detail-label">Notes</span>
	            <span class="event-detail-value">${escapeHtml(event.notes)}</span>
	          </div>
	        ` : ''}
	        ${canEdit ? `
	          <div style="display:flex; gap: 10px; justify-content:flex-end; margin-top: 14px;">
	            <button class="btn btn-sm btn-secondary" data-action="edit" data-id="${escapeHtml(event.id)}">Edit</button>
	            <button class="btn btn-sm btn-secondary" data-action="delete" data-id="${escapeHtml(event.id)}">Remove</button>
	          </div>
	        ` : ''}
      `;

      document.getElementById('eventModal').classList.add('active');
    }

    function closeEventModal() {
      document.getElementById('eventModal').classList.remove('active');
    }

    // Close modal on outside click
    document.getElementById('eventModal')?.addEventListener('click', (e) => {
      if (e.target.id === 'eventModal') closeEventModal();
    });

    document.getElementById('requestForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const request = {
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        reason: document.getElementById('reason').value,
        notes: document.getElementById('notes').value
      };

      try {
        const response = await fetch('/api/timeoff/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(request)
        });

        if (response.ok) {
          alert('Time off published!');
          document.getElementById('requestForm').reset();
          await loadTimeOffData();
        } else {
          alert('Error publishing time off');
        }
      } catch (error) {
        alert('Error submitting request');
      }
    });

    function openEditModal(id) {
      const entry = allEvents.find(e => e.id === id);
      if (!entry) return;
      document.getElementById('editEntryId').value = entry.id;
      document.getElementById('editStartDate').value = entry.startDate || '';
      document.getElementById('editEndDate').value = entry.endDate || '';
      document.getElementById('editReason').value = entry.reason || 'vacation';
      document.getElementById('editNotes').value = entry.notes || '';
      closeEventModal();
      document.getElementById('editEntryModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editEntryModal').classList.remove('active');
    }

    async function saveEdit() {
      const id = document.getElementById('editEntryId').value;
      const payload = {
        startDate: document.getElementById('editStartDate').value,
        endDate: document.getElementById('editEndDate').value,
        reason: document.getElementById('editReason').value,
        notes: document.getElementById('editNotes').value
      };

      const btn = document.getElementById('saveEditBtn');
      if (btn) btn.disabled = true;
      try {
        const resp = await fetch(`/api/timeoff/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || 'Update failed');
        closeEditModal();
        await loadTimeOffData();
      } catch (e) {
        alert(e?.message || 'Update failed');
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    // Manager spreadsheet removed (shared calendar only).

    function setupEventDelegation() {
      if (document._timeOffDelegationSetup) return;
      document._timeOffDelegationSetup = true;

      document.getElementById('calendarGrid')?.addEventListener('click', (e) => {
        const item = e.target.closest('.timeoff-event');
        if (!item) return;
        const id = item.getAttribute('data-event-id');
        if (!id) return;
        showEventDetails(id);
      });

      document.getElementById('eventModalBody')?.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        if (!action || !id) return;
        if (action === 'edit') return openEditModal(id);
        if (action === 'delete') return deleteEntry(id);
      });

      document.getElementById('editEntryModal')?.addEventListener('click', (e) => {
        if (e.target.id === 'editEntryModal') closeEditModal();
      });

      document.getElementById('saveEditBtn')?.addEventListener('click', saveEdit);
    }

    async function deleteEntry(id) {
      if (!confirm('Remove this time off entry?')) return;
      try {
        const resp = await fetch(`/api/timeoff/${id}`, { method: 'DELETE', credentials: 'include' });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || 'Delete failed');
        closeEventModal();
        await loadTimeOffData();
      } catch (e) {
        alert(e?.message || 'Delete failed');
      }
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      currentDate = new Date();
      renderCalendar();
    });

    async function initTimeOffPage() {
      await checkAuth();
      setupEventDelegation();
      await loadTimeOffData();
    }

    // Init (robust for cached/fast loads)
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initTimeOffPage);
    } else {
      initTimeOffPage();
    }
  </script>
  <script src="/js/shared-header.js?v=22"></script>
</body>
</html>
