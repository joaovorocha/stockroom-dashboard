<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
    <style>
      :root {
        --bg: #0b0f19;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: rgba(255, 255, 255, 0.08);
        --primary: #3b82f6;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(1000px 500px at 20% 10%, rgba(59, 130, 246, 0.22), transparent),
          radial-gradient(900px 450px at 80% 20%, rgba(16, 185, 129, 0.15), transparent),
          var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: rgba(17, 24, 39, 0.9);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      h1 { margin: 0 0 6px; font-size: 22px; }
      p { margin: 0 0 16px; color: var(--muted); line-height: 1.4; }
      label { display: block; font-size: 14px; margin-bottom: 6px; color: var(--muted); }
      input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        outline: none;
      }
      input:focus { border-color: rgba(59, 130, 246, 0.6); }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 560px) {
        .grid { grid-template-columns: 1fr; }
      }
      .row { margin-top: 12px; }
      .btn {
        width: 100%;
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(59, 130, 246, 0.25);
        background: linear-gradient(180deg, rgba(59, 130, 246, 0.95), rgba(37, 99, 235, 0.95));
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:disabled { opacity: 0.7; cursor: not-allowed; }
      .msg {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        color: var(--muted);
        display: none;
      }
      .msg.error { color: #fecaca; border-color: rgba(239, 68, 68, 0.35); }
      .check {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 14px;
      }
      a { color: var(--muted); text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Reset password</h1>
      <p>Set a new password. If your profile is missing email/phone, you can fill it here too.</p>

      <form id="form">
        <div class="grid">
          <div class="row">
            <label for="email">Email (optional)</label>
            <input id="email" type="email" autocomplete="email" placeholder="name@company.com" />
          </div>
          <div class="row">
            <label for="phone">Phone (optional)</label>
            <input id="phone" type="tel" autocomplete="tel" placeholder="(xxx) xxx-xxxx" />
          </div>
        </div>

        <div class="row">
          <label for="password">New password</label>
          <input id="password" type="password" autocomplete="new-password" placeholder="Enter a new password" required />
        </div>

        <div class="check">
          <input id="rememberDevice" type="checkbox" />
          <label for="rememberDevice" style="margin: 0;">Remember this device for 30 days</label>
        </div>

        <button class="btn" id="submitBtn" type="submit">Reset password</button>
        <div class="msg" id="msg"></div>
        <div class="row" style="text-align:center; margin-top: 14px;">
          <a href="/login">Back to login</a>
        </div>
      </form>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token') || '';
      const form = document.getElementById('form');
      const msg = document.getElementById('msg');
      const btn = document.getElementById('submitBtn');

      function showMessage(text, isError = false) {
        msg.textContent = text;
        msg.classList.toggle('error', !!isError);
        msg.style.display = 'block';
      }

      if (!token) {
        showMessage('Missing reset token. Please request a new reset email.', true);
        btn.disabled = true;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!token) return;

        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const rememberDevice = document.getElementById('rememberDevice').checked;

        btn.disabled = true;
        msg.style.display = 'none';

        try {
          const res = await fetch('/api/auth/password-reset/confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password, rememberDevice, email, phone }),
            credentials: 'include'
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.success) {
            showMessage(data.error || 'Reset failed. Please request a new reset email.', true);
            return;
          }

          const needs = data.user?.needsProfileCompletion || data.user?.mustChangePassword;
          window.location.replace(needs ? '/complete-profile' : '/home');
        } catch (err) {
          showMessage('Reset failed. Please try again.', true);
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
