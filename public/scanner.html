<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <title>Scanner - Daily Game Plan | San Francisco</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stockroom">
  <link rel="stylesheet" href="/css/theme.css?v=14">
  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <link rel="stylesheet" href="/css/dashboard.css?v=17">
  <link rel="stylesheet" href="/css/mobile.css?v=3">
  <style>
    .scanner-box {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
    }
    .scanner-input {
      font-size: 18px;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .scanner-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .scanner-status {
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }
    .scanner-status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #2e7d32;
    }
    .scanner-status.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #c62828;
    }
    .camera-container {
      margin-top: 24px;
      display: none;
    }
    .camera-container.active {
      display: block;
    }
    #cameraVideo {
      width: 100%;
      max-width: 500px;
      border-radius: 8px;
      border: 2px solid var(--border);
    }
    .instructions {
      background: var(--surface);
      border-radius: 8px;
      padding: 20px;
      margin-top: 24px;
      text-align: left;
    }
    .instructions h4 {
      margin-bottom: 12px;
      font-weight: 600;
    }
    .instructions ul {
      list-style: disc;
      padding-left: 20px;
      color: var(--text-secondary);
    }
    .instructions li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <!-- Shared Header Mount -->
  <div id="shared-header-mount"></div>
<div class="dashboard-layout" style="grid-template-columns: 1fr;">
  <main class="main-content">
  <footer class="footer">
    <p>Daily Game Plan - San Francisco | Developed by Victor Rocha | 831-998-3808</p>
  </footer>

  <script src="/js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
      setupScanner();
    });

    async function checkAuth() {
      try {
        const response = await fetch('/api/auth/check');
        const data = await response.json();
        if (data.authenticated) {
          const userNameEl = document.getElementById('userName');
          if (userNameEl) userNameEl.textContent = data.user.name;

          const navAdmin = document.getElementById('navAdmin');
          if (navAdmin) navAdmin.style.display = data.user.isAdmin ? 'inline' : 'none';

          const navFeedback = document.getElementById('navFeedback');
          // Feedback link is shown at the bottom of the page (shared-header.js).
          if (navFeedback) navFeedback.style.display = 'none';
        }
      } catch (e) {}
    }

    function setupScanner() {
      const input = document.getElementById('scannerInput');
      const status = document.getElementById('scannerStatus');

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === 'Tab') {
          e.preventDefault();
          processScan(input.value);
        }
      });

      document.getElementById('clearBtn').addEventListener('click', () => {
        input.value = '';
        status.className = 'scanner-status';
        input.focus();
      });

      document.getElementById('cameraBtn').addEventListener('click', openCamera);
      document.getElementById('closeCameraBtn').addEventListener('click', closeCamera);
    }

    function processScan(data) {
      const status = document.getElementById('scannerStatus');
      const input = document.getElementById('scannerInput');

      if (!data.trim()) {
        status.className = 'scanner-status error';
        status.textContent = 'No data scanned';
        return;
      }

      const psusOrder = extractPSUSNumber(data);
      if (psusOrder) {
        status.className = 'scanner-status success';
        status.textContent = `Order found: ${psusOrder} - Opening Order Status...`;

        const url = getMAOOrderURL(psusOrder);
        if (url) openInNewTab(url);
        input.value = '';
        input.focus();
        return;
      }

      // Data Matrix - copy to clipboard and open inventory system
      copyToClipboard(data).then((ok) => {
        if (!ok) {
          status.className = 'scanner-status error';
          status.textContent = 'Failed to copy to clipboard';
          return;
        }

        status.className = 'scanner-status success';
        status.textContent = `Data copied - Opening Inventory System`;

        openInNewTab(getInventoryURL());
        input.value = '';
        input.focus();
      });
    }

    let videoStream = null;
    let scanLoopRunning = false;
    let barcodeDetector = null;

    async function openCamera() {
      const status = document.getElementById('scannerStatus');
      const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      if (location.protocol !== 'https:' && !isLocalhost) {
        status.className = 'scanner-status error';
        status.innerHTML = `Camera requires HTTPS. Open the secure site to use the camera: <a href="https://ssussf.duckdns.org/scanner" target="_blank" rel="noopener noreferrer">ssussf.duckdns.org/scanner</a>`;
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        status.className = 'scanner-status error';
        status.textContent = 'Camera is not supported in this browser/device.';
        return;
      }

      try {
        const video = document.getElementById('cameraVideo');
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        video.srcObject = videoStream;
        document.getElementById('cameraContainer').classList.add('active');

        // Start decoding frames using the built-in BarcodeDetector (no external libs).
        if (!('BarcodeDetector' in window)) {
          status.className = 'scanner-status error';
          status.textContent = 'Barcode scanning is not supported in this browser. Use the text field scanner.';
          return;
        }
        if (!barcodeDetector) {
          barcodeDetector = new BarcodeDetector({ formats: ['qr_code', 'data_matrix'] });
        }
        scanLoopRunning = true;
        status.className = 'scanner-status';
        status.textContent = '';

        const tick = async () => {
          if (!scanLoopRunning) return;
          try {
            // Wait until the video has dimensions.
            if (video.readyState >= 2) {
              const codes = await barcodeDetector.detect(video);
              if (codes && codes.length) {
                const raw = (codes[0].rawValue || '').toString();
                if (raw) {
                  scanLoopRunning = false;
                  closeCamera();
                  processScan(raw);
                  return;
                }
              }
            }
          } catch (_) {
            // Ignore decode errors and keep scanning.
          }
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      } catch (e) {
        status.className = 'scanner-status error';
        status.textContent = `Camera error: ${e?.message || 'access denied or not available'}`;
      }
    }

    function closeCamera() {
      scanLoopRunning = false;
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
      document.getElementById('cameraContainer').classList.remove('active');
      document.getElementById('scannerInput').focus();
    }
  </script>
  <script src="/js/shared-header.js?v=22"></script>
</body>
</html>
