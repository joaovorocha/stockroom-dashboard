<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password</title>
    <style>
      :root {
        --bg: #0b0f19;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: rgba(255, 255, 255, 0.08);
        --primary: #3b82f6;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(1000px 500px at 20% 10%, rgba(59, 130, 246, 0.22), transparent),
          radial-gradient(900px 450px at 80% 20%, rgba(16, 185, 129, 0.15), transparent),
          var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .card {
        width: 100%;
        max-width: 460px;
        background: rgba(17, 24, 39, 0.9);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      h1 { margin: 0 0 6px; font-size: 22px; }
      p { margin: 0 0 16px; color: var(--muted); line-height: 1.4; }
      label { display: block; font-size: 14px; margin-bottom: 6px; color: var(--muted); }
      input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        outline: none;
      }
      input:focus { border-color: rgba(59, 130, 246, 0.6); }
      .row { margin-top: 12px; }
      .btn {
        width: 100%;
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(59, 130, 246, 0.25);
        background: linear-gradient(180deg, rgba(59, 130, 246, 0.95), rgba(37, 99, 235, 0.95));
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:disabled { opacity: 0.7; cursor: not-allowed; }
      .msg {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        color: var(--muted);
        display: none;
      }
      .msg.error { color: #fecaca; border-color: rgba(239, 68, 68, 0.35); }
      .footer {
        margin-top: 14px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }
      a { color: var(--muted); text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Forgot password</h1>
      <p>Enter your Employee ID (or email). If an account exists and has an email on file, we’ll send a reset link.</p>

      <form id="form">
        <div class="row">
          <label for="login">Employee ID or Email</label>
          <input id="login" type="text" autocomplete="username" placeholder="e.g. 12345 or name@company.com" required />
        </div>

        <button class="btn" id="submitBtn" type="submit">Send reset link</button>
        <div class="msg" id="msg"></div>
      </form>

      <div class="footer">
        <a href="/login">Back to login</a>
      </div>
    </div>

    <script>
      const form = document.getElementById('form');
      const msg = document.getElementById('msg');
      const btn = document.getElementById('submitBtn');

      function showMessage(text, isError = false) {
        msg.textContent = text;
        msg.classList.toggle('error', !!isError);
        msg.style.display = 'block';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const login = document.getElementById('login').value.trim();
        if (!login) return;

        btn.disabled = true;
        msg.style.display = 'none';

        try {
          const res = await fetch('/api/auth/password-reset/request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login })
          });
          const data = await res.json().catch(() => ({}));
          showMessage(data.message || 'If that account exists, an email will be sent.');
        } catch (err) {
          showMessage('Could not send request. Please try again.', true);
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
