<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Complete Profile</title>
    <style>
      :root {
        --bg: #0b0f19;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: rgba(255, 255, 255, 0.08);
        --primary: #3b82f6;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(1000px 500px at 20% 10%, rgba(59, 130, 246, 0.22), transparent),
          radial-gradient(900px 450px at 80% 20%, rgba(16, 185, 129, 0.15), transparent),
          var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .card {
        width: 100%;
        max-width: 540px;
        background: rgba(17, 24, 39, 0.9);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      h1 { margin: 0 0 6px; font-size: 22px; }
      p { margin: 0 0 16px; color: var(--muted); line-height: 1.4; }
      label { display: block; font-size: 14px; margin-bottom: 6px; color: var(--muted); }
      input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        outline: none;
      }
      input:focus { border-color: rgba(59, 130, 246, 0.6); }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 560px) {
        .grid { grid-template-columns: 1fr; }
      }
      .row { margin-top: 12px; }
      .btn {
        width: 100%;
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(59, 130, 246, 0.25);
        background: linear-gradient(180deg, rgba(59, 130, 246, 0.95), rgba(37, 99, 235, 0.95));
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:disabled { opacity: 0.7; cursor: not-allowed; }
      .msg {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        color: var(--muted);
        display: none;
      }
      .msg.error { color: #fecaca; border-color: rgba(239, 68, 68, 0.35); }
      .check {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Complete your profile</h1>
      <p>Before continuing, add your email + phone and set a new password.</p>

      <form id="form">
        <div class="grid">
          <div class="row">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required />
          </div>
          <div class="row">
            <label for="phone">Phone</label>
            <input id="phone" type="tel" autocomplete="tel" required />
          </div>
        </div>

        <div class="row">
          <label for="password">New password</label>
          <input id="password" type="password" autocomplete="new-password" required />
        </div>

        <div class="check">
          <input id="rememberDevice" type="checkbox" />
          <label for="rememberDevice" style="margin: 0;">Remember this device for 30 days</label>
        </div>

        <button class="btn" id="submitBtn" type="submit">Save and continue</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>

    <script>
      const form = document.getElementById('form');
      const msg = document.getElementById('msg');
      const btn = document.getElementById('submitBtn');

      function showMessage(text, isError = false) {
        msg.textContent = text;
        msg.classList.toggle('error', !!isError);
        msg.style.display = 'block';
      }

      async function loadMe() {
        try {
          const res = await fetch('/api/auth/check', { credentials: 'include' });
          const data = await res.json().catch(() => ({}));
          if (!data.authenticated) {
            window.location.replace('/login');
            return;
          }
          document.getElementById('email').value = data.user?.email || '';
          document.getElementById('phone').value = data.user?.phone || '';
        } catch (e) {
          // ignore
        }
      }

      loadMe();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const rememberDevice = document.getElementById('rememberDevice').checked;

        btn.disabled = true;
        msg.style.display = 'none';

        try {
          const res = await fetch('/api/auth/profile/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, phone, password, rememberDevice }),
            credentials: 'include'
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.success) {
            showMessage(data.error || 'Could not save profile. Please try again.', true);
            return;
          }
          window.location.replace('/app');
        } catch (err) {
          showMessage('Could not save profile. Please try again.', true);
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
