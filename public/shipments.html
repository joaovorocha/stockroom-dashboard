<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="view-transition" content="same-origin">
  <title>Shipments - Daily Game Plan | San Francisco</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Daily Operations">
  <link rel="stylesheet" href="/css/theme.css?v=14">
  <link rel="stylesheet" href="/css/shared-header.css?v=22">
  <link rel="stylesheet" href="/css/dashboard.css?v=17">
  <link rel="stylesheet" href="/css/mobile.css?v=6">
  <style>
    :root { --shipments-font-scale: 1; }
    .page-wrap { padding: 16px; max-width: 1200px; margin: 0 auto; }
    .section-header-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .filter-bar { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; align-items: center; }
    .filter-bar input, .filter-bar select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      background: var(--surface);
      color: var(--text-primary);
    }
    .filter-bar input { flex: 1; min-width: 220px; }
    .summary-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin: 10px 0 14px;
    }
    .summary-item {
      background: var(--surface);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .summary-item .count { font-size: 18px; font-weight: 700; }
    .summary-item .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
    .summary-item.summary-clickable { cursor: pointer; }
    .summary-item.summary-clickable:hover { background: var(--surface-hover); }

    .shipment-list { display: grid; gap: 10px; }
    .shipment-card {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .shipment-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .tracking-number { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-weight: 700; font-size: calc(14px * var(--shipments-font-scale)); }
    .meta { font-size: calc(12px * var(--shipments-font-scale)); color: var(--text-secondary); }
    .status-pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
      white-space: nowrap;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .status-pill.delivered { background: var(--success); color: #fff; }
    .status-pill.label-created { background: #607d8b; color: #fff; }
    .status-pill.in-transit { background: #2196f3; color: #fff; }
    .status-pill.unknown { background: #9e9e9e; color: #fff; }
    .status-pill.requested { background: #9c27b0; color: #fff; }
    .status-pill.returned { background: #ff9800; color: #fff; }
    .missing-badge {
      display: inline-block;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
    }
    .missing-list { font-size: 12px; color: var(--text-secondary); margin-top:6px; }

    .shipment-body { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; margin-top: 10px; }
    .field label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
    .field div { font-size: 13px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .field .wrap { white-space: normal; }
	    .link-row { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
	    .link-row a { color: var(--primary); text-decoration: none; font-size: 13px; }
	    .mao-link {
	      display: inline-flex;
	      align-items: center;
	      gap: 6px;
	      color: var(--primary);
	      text-decoration: none;
	      font-size: 13px;
	      white-space: nowrap;
	    }
	    .mao-link .icon {
	      display: inline-block;
	      font-size: 13px;
	      line-height: 1;
	    }
    .empty {
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text-secondary);
    }
    .small-note { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

    /* Phones: 2x2 summary grid */
    @media (max-width: 768px) {
      .summary-row { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    }
  </style>
</head>
<body>
  <!-- Shared Header Mount -->
  <div id="shared-header-mount"></div>
<div class="page-wrap">
    <div class="page-header" style="margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">
      <div style="font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;">Daily Operations</div>
      <h1 style="font-size: 24px; font-weight: 600; margin: 0 0 8px;">📦 Shipments</h1>
      <p style="font-size: 14px; color: var(--text-secondary); margin: 0;">Track and manage all shipments and packages for your store.</p>
    </div>    <section class="section">
      <div class="section-header section-header-row">
        <div>
          <h2 style="margin:0;">Shipments</h2>
        </div>
        <div class="controls">
          <button id="refreshAllBtn" class="btn">Refresh All Statuses</button>
          <div class="small-note" id="autoRefreshNote">Auto-refreshing…</div>
        </div>
      </div>

      <div class="summary-row">
        <div class="summary-item summary-clickable" id="showAllBtn">
          <div class="count" style="font-size: 18px; padding-top: 8px;">All Shipments</div>
        </div>
        <div class="summary-item summary-clickable" data-status="label-created">
          <div class="count" id="countLabelCreated">0</div>
          <div class="label">Label Created</div>
        </div>
        <div class="summary-item summary-clickable" data-status="in-transit">
          <div class="count" id="countInTransit">0</div>
          <div class="label">In Transit</div>
        </div>
        <div class="summary-item summary-clickable" data-status="delivered">
          <div class="count" id="countDelivered">0</div>
          <div class="label">Delivered</div>
        </div>
        <div class="summary-item summary-clickable" data-status="unknown">
          <div class="count" id="countUnknown">0</div>
          <div class="label">Unknown</div>
        </div>
      </div>

      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search tracking, customer, address, employee, PSUS...">
        <select id="statusFilter" aria-label="Status filter">
          <option value="">All statuses</option>
          <option value="label-created">Label created</option>
          <option value="in-transit">In transit</option>
          <option value="delivered">Delivered</option>
          <option value="unknown">Unknown</option>
          <option value="requested">Requested</option>
        </select>
        <div class="summary-item" style="padding: 4px 12px; text-align: center; min-width: 80px;">
          <div class="count" id="countTotal">0</div>
          <div class="label">Shown</div>
        </div>
      </div>

      <div class="shipment-list" id="shipmentsList"></div>
      <div class="empty" id="emptyState" style="display:none;">No shipments match your filters.</div>
    </section>
  </div>

  <!-- Tracking Modal -->
  <div class="modal-overlay" id="trackingModal" style="display:none; align-items:center; justify-content:center; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:1001;">
    <div class="modal" style="background:#fff; border-radius:10px; padding:20px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:15px;">
        <h3 style="margin:0;">Tracking History</h3>
        <button onclick="closeTrackingModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
      </div>
      <div id="trackingModalBody">
        <!-- Tracking events will be rendered here -->
      </div>
    </div>
  </div>

  <script src="/js/shared-header.js?v=24"></script>
  <script>
    let allShipments = [];
    let currentUser = null;
    let refreshTimer = null;
    let lastRefreshAt = null;
    const AUTO_REFRESH_INTERVAL = 60_000;

    function safeText(value) {
      return (value === undefined || value === null) ? '' : String(value);
    }

    function formatDate(value) {
      if (!value) return '';
      // If value is an object (e.g. Date instance or parsed object), try to normalize
      if (typeof value === 'object' && value !== null) {
        if (typeof value.toISOString === 'function') {
          value = value.toISOString();
        } else if (value.iso) {
          value = value.iso;
        } else {
          // Plain objects are likely malformed here (e.g. `{}`) — don't render JSON
          // to the user. Treat as missing value and return empty string.
          return '';
        }
      }
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return safeText(value);
      // Return only the date (no time) to hide time information in the UI
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
    }

    function formatDateTime(value) {
      if (!value) return 'N/A';
      const d = new Date(value);
      if (isNaN(d.getTime())) {
        // Fallback for different date formats if needed
        return 'Invalid Date';
      }
      return d.toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
      });
    }

    function trackingLink(trackingNumber) {
      const t = safeText(trackingNumber).trim();
      if (!t) return '';
      return `https://www.ups.com/track?tracknum=${encodeURIComponent(t)}`;
    }

    function isEmailCaptured(shipment) {
      const src = safeText(shipment.source).toLowerCase();
      if (src === 'email-import') return true;
      const statusSrc = safeText(shipment.statusUpdatedSource).toLowerCase();
      return statusSrc === 'email';
    }

    function canManage(user) {
      const role = safeText(user && user.role).toUpperCase();
      return !!(user && (user.isAdmin || user.isManager || role === 'MANAGEMENT' || role === 'BOH'));
    }

    function applyFilters() {
      const q = safeText(document.getElementById('searchInput').value).trim().toLowerCase();
      const status = document.getElementById('statusFilter').value;
      return (allShipments || []).filter(s => {
        // Enforce UPS tracking starting with '1Z' — ignore any entries that don't match
        const tracking = safeText(s.trackingNumber || s.tracking).trim().toUpperCase();
        if (!tracking.startsWith('1Z')) return false;

        if (status) {
          const st = safeText(s.status).toLowerCase().replace(/_/g, '-');
          if (st !== status) return false;
        }

        if (!q) return true;
        const haystack = [
          tracking,
          safeText(s.customerName),
          safeText(s.destination),
          safeText(s.shipper),
          safeText(s.notes),
          safeText(s.orderNumber),
          safeText(s.processedByName),
          safeText(s.processedById),
          safeText(s.reference1),
          safeText(s.reference2),
          safeText(s.customerAddress && typeof s.customerAddress === 'object' ? `${s.customerAddress.line1 || ''} ${s.customerAddress.line2 || ''} ${s.customerAddress.city || ''} ${s.customerAddress.state || ''} ${s.customerAddress.zip || ''} ${s.customerAddress.country || ''}` : s.customerAddress)
        ].join(' ').toLowerCase();
        return haystack.includes(q);
      });
    }

    function updateSummary(filteredItems, totalItems) {
      const shownCount = filteredItems.length;
      const counts = { 'label-created': 0, 'in-transit': 0, delivered: 0, unknown: 0 };
      
      // Use the full list for status counts
      for (const s of totalItems) {
        const st = safeText(s.status || s.lastUpsStatus || 'unknown').toLowerCase().replace(/_/g, '-');
        if (st === 'label-created') counts['label-created']++;
        else if (st === 'in-transit') counts['in-transit']++;
        else if (st === 'delivered') counts.delivered++;
        else if (st === 'unknown') counts.unknown++;
      }
      
      document.getElementById('countTotal').textContent = String(shownCount); // "Shown" reflects the filtered count
      document.getElementById('countLabelCreated').textContent = String(counts['label-created']);
      document.getElementById('countInTransit').textContent = String(counts['in-transit']);
      document.getElementById('countDelivered').textContent = String(counts.delivered);
      document.getElementById('countUnknown').textContent = String(counts.unknown);
    }

    function getShipmentSortTime(s) {
        const v = s && typeof s === 'object'
          ? (s.shippedAt || s.shippedDate || s.shipDate || s.emailDate || s.importedAt || s.createdAt || s.updatedAt || 0)
          : 0;
        const t = new Date(v).getTime();
        return Number.isFinite(t) ? t : 0;
      }


    function renderShipments() {
      const list = document.getElementById('shipmentsList');
      const empty = document.getElementById('emptyState');
      const filteredItems = applyFilters().sort((a, b) => {
        const statusOrder = {
          'label-created': 1,
          'in-transit': 2,
          'delivered': 3,
          'exception': 4,
          'unknown': 5,
          'returned': 6
        };

        const aStatus = (safeText(a.status || a.lastUpsStatus || 'unknown').toLowerCase().replace(/_/g, '-'));
        const bStatus = (safeText(b.status || b.lastUpsStatus || 'unknown').toLowerCase().replace(/_/g, '-'));

        const aRank = statusOrder[aStatus] || 99;
        const bRank = statusOrder[bStatus] || 99;

        if (aRank !== bRank) {
          return aRank - bRank;
        }

        // Secondary sort: by date (most recent first)
        const ad = getShipmentSortTime(a);
        const bd = getShipmentSortTime(b);
        if (bd !== ad) return bd - ad;
        
        // tie-breaker: most recently updated
        const au = new Date(a.updatedAt || 0).getTime() || 0;
        const bu = new Date(b.updatedAt || 0).getTime() || 0;
        return bu - au;
      });

      // Pass both the filtered and total lists to the summary function
      updateSummary(filteredItems, allShipments);

      if (!filteredItems.length) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      list.innerHTML = filteredItems.map(s => {
        const tracking = safeText(s.trackingNumber || s.tracking).trim();
        const status = safeText(s.status || s.lastUpsStatus || 'unknown').toLowerCase().replace(/_/g, '-') || 'unknown';
        // detect returned packages
        const isReturned = status.includes('return') || safeText(s.statusFromUps).toLowerCase().includes('return') || !!s.returned;
        const customer = safeText(s.customerName) || safeText(s.destination) || '—';
        const when = formatDate(s.shippedAt || s.shippedDate || s.shipDate || s.emailDate || s.importedAt || s.createdAt || s.updatedAt);
        const src = safeText(s.source || s.statusUpdatedSource || '').trim() || '—';
        const link = trackingLink(tracking);
        const statusFromUps = safeText(s.statusFromUps || s.lastUpsStatus || '').trim();
        const estimatedDelivery = s.estimatedDeliveryAt || s.estimatedDelivery;
        // detect missing fields
        const missing = [];
        if (!tracking) missing.push('tracking');
        if (!s.customerName || !String(s.customerName).trim()) missing.push('customer');
        const addrObj = s.customerAddress && typeof s.customerAddress === 'object' ? s.customerAddress : null;
        if (!addrObj || (!addrObj.line1 && !addrObj.city && !addrObj.zip && !addrObj.country)) missing.push('address');
	        const processedBy = safeText(s.processedByName || s.employeeName);
          const processedById = safeText(s.processedById || s.employeeId);
	        const orderNumber = safeText(s.orderNumber || s.reference2);
	        const psus = (typeof extractPSUSNumber === 'function') ? extractPSUSNumber(orderNumber) : null;
	        const maoUrl = (psus && typeof getMAOOrderURL === 'function') ? getMAOOrderURL(psus) : null;
        const addr = (s.customerAddress && typeof s.customerAddress === 'object')
          ? [safeText(s.customerAddress.line1), safeText(s.customerAddress.line2), [safeText(s.customerAddress.city), safeText(s.customerAddress.state), safeText(s.customerAddress.zip)].filter(Boolean).join(' '), safeText(s.customerAddress.country)].filter(Boolean).join(', ')
          : safeText(s.customerAddress);

        return `
          <div class="shipment-card">
            <div class="shipment-top">
              <div>
                <div class="tracking-number">${tracking ? tracking : 'No Tracking'}</div>
                  <div class="meta">${src ? `${src}` : ''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="status-pill ${isReturned ? 'returned' : status}">${isReturned ? 'Returned' : status.replace('-', ' ')}</div>
                ${missing.length ? `<span class="missing-badge" title="Missing: ${missing.join(', ')}">Missing</span>` : ''}
              </div>
            </div>
            <div class="meta" style="margin-top:4px;">
              ${estimatedDelivery ? `Est. Delivery: <strong>${formatDate(estimatedDelivery)}</strong>` : ''}
            </div>
	            <div class="shipment-body">
              <div class="field">
                <label>Customer / Destination</label>
                <div class="wrap">${customer}</div>
              </div>
              <div class="field">
                <label>Address</label>
                <div class="wrap">${addr || '—'}</div>
              </div>
              ${missing.length ? `<div class="missing-list">Missing fields: ${missing.join(', ')}</div>` : ''}
              <div class="field">
                <label>UPS Status</label>
                <div class="wrap">${statusFromUps || '—'}</div>
              </div>
              <div class="field">
                <label>Processed By</label>
                <div class="wrap">${processedById ? `${processedBy || '—'} (${processedById})` : (processedBy || '—')}</div>
              </div>
              <!-- Processed Date removed per request -->
	              <div class="field">
	                <label>UPS Service</label>
	                <div class="wrap">${safeText(s.serviceType || s.service || '') || '—'}</div>
	              </div>
	              <div class="field">
	                <label>Order</label>
	                <div class="wrap">
	                  ${psus && maoUrl
	                    ? `${psus} <a class="mao-link" href="${maoUrl}" target="_blank" rel="noopener noreferrer" title="View on MAO"><span class="icon">↗</span><span>(View on MAO)</span></a>`
	                    : (orderNumber || '—')
	                  }
	                </div>
	              </div>
	              <div class="field">
	                <label>Packages / Weight</label>
	                <div class="wrap">${(s.packageCount !== undefined && s.packageCount !== null) ? safeText(s.packageCount) : '—'} / ${(s.packageWeightLbs !== undefined && s.packageWeightLbs !== null) ? `${safeText(s.packageWeightLbs)} lbs` : '—'}</div>
	              </div>
	            </div>
	            <div class="link-row">
                <div>
	                ${link ? `<a href="${link}" target="_blank" rel="noopener noreferrer">Open UPS Tracking</a>` : `<span class="meta">No tracking link</span>`}
	                <button class="btn-link" onclick="fetchAndRenderTracking(${s.id})">View Real-Time Status</button>
                </div>
                <div>
                  <button class="btn-link-danger" onclick="handleDeleteShipment(${s.id})">Delete</button>
                </div>
	            </div>
	          </div>
	        `;
	      }).join('');
	    }

    function setAutoRefreshMessage(message) {
      const el = document.getElementById('autoRefreshNote');
      if (el) el.textContent = message;
    }

    function closeTrackingModal() {
      const modal = document.getElementById('trackingModal');
      if (modal) modal.style.display = 'none';
    }

    function handleShowAll() {
      document.getElementById('searchInput').value = '';
      document.getElementById('statusFilter').value = '';
      renderShipments();
    }

    async function handleDeleteShipment(shipmentId) {
      if (!confirm('Are you sure you want to permanently delete this shipment? This action cannot be undone.')) {
        return;
      }

      try {
        const resp = await fetch(`/api/shipments/${shipmentId}`, {
          method: 'DELETE',
          credentials: 'include'
        });

        if (!resp.ok) {
          const errData = await resp.json();
          throw new Error(errData.error || 'Failed to delete shipment.');
        }

        // Remove from local list and re-render
        allShipments = allShipments.filter(s => s.id !== shipmentId);
        renderShipments();
        alert('Shipment deleted successfully.');

      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function fetchAndRenderTracking(shipmentId) {
      const modal = document.getElementById('trackingModal');
      const body = document.getElementById('trackingModalBody');
      if (!modal || !body) return;

      body.innerHTML = '<div>Loading tracking details...</div>';
      modal.style.display = 'flex';

      try {
        const resp = await fetch(`/api/shipments/${shipmentId}/tracking`);
        if (!resp.ok) {
          const errData = await resp.json();
          throw new Error(errData.error || 'Failed to load tracking data.');
        }
        const data = await resp.json();

        let historyHtml = `
          <div style="margin-bottom:15px;">
            <div><strong>Tracking #:</strong> ${data.trackingNumber}</div>
            <div><strong>Latest Status:</strong> ${data.latestStatus}</div>
            ${data.estimatedDelivery ? `<div><strong>Est. Delivery:</strong> ${formatDate(data.estimatedDelivery)}</div>` : ''}
          </div>
          <ul style="list-style:none; padding:0; margin:0;">
        `;

        if (data.history && data.history.length > 0) {
          data.history.forEach(event => {
            historyHtml += `
              <li style="padding-bottom:12px; border-left:2px solid #ddd; padding-left:12px; position:relative;">
                <div style="position:absolute; left:-7px; top:4px; width:12px; height:12px; background:#fff; border:2px solid #ddd; border-radius:50%;"></div>
                <div><strong>${event.status}</strong></div>
                <div style="font-size:12px; color:#555;">${formatDateTime(event.eventTimestamp)}</div>
                <div style="font-size:12px; color:#555;">${[event.locationCity, event.locationState, event.locationCountry].filter(Boolean).join(', ')}</div>
                ${event.details ? `<div style="font-size:12px; color:#777;">${event.details}</div>` : ''}
              </li>
            `;
          });
        } else {
          historyHtml += '<li>No tracking history available.</li>';
        }

        historyHtml += '</ul>';
        body.innerHTML = historyHtml;

        // Update the main shipment list with the new data
        const shipmentInList = allShipments.find(s => s.id === shipmentId);
        if (shipmentInList) {
          shipmentInList.status = data.latestStatus || shipmentInList.status;
          shipmentInList.lastUpsStatus = data.latestStatus || shipmentInList.status;
          shipmentInList.estimatedDeliveryAt = data.estimatedDelivery || shipmentInList.estimatedDeliveryAt;
          renderShipments(); // Re-render the list to show the updated status
        }

      } catch (err) {
        body.innerHTML = `<div style="color:red;">Error: ${err.message}</div>`;
      }
    }

    function formatRefreshTime(date) {
      if (!date) return '';
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function loadShipments({ showLoader = false } = {}) {
      console.log('[Shipments] loadShipments started.'); // DEBUG
      const list = document.getElementById('shipmentsList');
      if (showLoader) list.innerHTML = '<div class="meta">Loading…</div>';
      setAutoRefreshMessage('Refreshing…');
      console.log('[Shipments] Fetching /api/shipments...'); // DEBUG
      try {
        const resp = await fetch('/api/shipments', { credentials: 'include' });
        console.log('[Shipments] Fetch response status:', resp.status); // DEBUG
        if (!resp.ok) throw new Error('Failed to load shipments');
        const data = await resp.json();
        // API returns { shipments: [] }, extract the array
        allShipments = Array.isArray(data) ? data : (data.shipments || []);
        lastRefreshAt = new Date();
        setAutoRefreshMessage(`Updated ${formatRefreshTime(lastRefreshAt)}`);
      } catch (e) {
        console.error(e);
        allShipments = [];
        setAutoRefreshMessage('Unable to refresh. Retrying shortly…');
      }
      renderShipments();
    }

    function startAutoRefresh() {
      if (refreshTimer) return;
      refreshTimer = setInterval(() => loadShipments().catch(() => {}), AUTO_REFRESH_INTERVAL);
    }

    function stopAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = null;
    }

    function setupSSE() {
      const sse = new EventSource('/api/sse/updates');
      
      sse.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);
          if (message.type === 'shipment_updated') {
            console.log('Received shipment update via SSE:', message.data);
            const updatedShipment = message.data;
            const shipmentInList = allShipments.find(s => s.id === updatedShipment.id);
            
            if (shipmentInList) {
              // Update the local data with all fields from the broadcast
              Object.assign(shipmentInList, updatedShipment);
              renderShipments();
            }
          }
        } catch (e) {
          // Ignore parse errors, likely a heartbeat
        }
      };

      sse.onerror = () => {
        // Handle SSE errors, maybe try to reconnect
        console.error('SSE connection error. Will auto-reconnect.');
        sse.close();
        setTimeout(setupSSE, 5000); // Reconnect after 5 seconds
      };
      
      console.log('SSE connection established for real-time updates.');
      stopAutoRefresh(); // Stop polling now that we have real-time updates
      setAutoRefreshMessage('Real-time updates enabled');
    }

    async function handleRefreshAll() {
      const btn = document.getElementById('refreshAllBtn');
      if (!btn) return;

      btn.textContent = 'Refreshing...';
      btn.disabled = true;

      try {
        const resp = await fetch('/api/shipments/refresh-statuses', { method: 'POST' });
        if (!resp.ok) {
          throw new Error('Refresh request failed.');
        }
        // The SSE `shipments_refreshed` event will trigger the UI update.
        // Or we can just manually reload. Let's do that for immediate feedback.
        await loadShipments(); 
        alert('All shipment statuses have been refreshed.');

      } catch (err) {
        alert('An error occurred during the refresh: ' + err.message);
      } finally {
        btn.textContent = 'Refresh All Statuses';
        btn.disabled = false;
      }
    }

    async function initPage() {
      console.log('[Shipments] initPage() started.'); // DEBUG
      SharedHeader.mountHeader({ showRefresh: false });
      await SharedHeader.init();
      console.log('[Shipments] SharedHeader initialized.'); // DEBUG
      currentUser = SharedHeader.currentUser;
      if (!currentUser) {
        window.location.href = '/login';
        return;
      }
      console.log('[Shipments] User is authenticated, proceeding.'); // DEBUG

      document.getElementById('searchInput').addEventListener('input', renderShipments);
      document.getElementById('statusFilter').addEventListener('change', renderShipments);
      document.getElementById('refreshAllBtn').addEventListener('click', handleRefreshAll);
      document.getElementById('showAllBtn').addEventListener('click', handleShowAll);

      // Add click listeners for summary cards
      document.querySelectorAll('.summary-clickable[data-status]').forEach(card => {
        card.addEventListener('click', () => {
          const status = card.dataset.status;
          document.getElementById('statusFilter').value = status;
          renderShipments();
        });
      });

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          if (tab === 'pickpack') {
            // Redirect to BOH shipments page (will be integrated later)
            window.location.href = '/boh-shipments';
            return;
          }
          // Default: stay on tracking view
          document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active');
            b.style.background = 'transparent';
            b.style.color = 'var(--text-secondary)';
          });
          btn.classList.add('active');
          btn.style.background = 'var(--primary)';
          btn.style.color = '#fff';
        });
      });

      console.log('[Shipments] Calling loadShipments...'); // DEBUG
      await loadShipments({ showLoader: true });
      console.log('[Shipments] loadShipments finished.'); // DEBUG

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          // You might want to close and re-open SSE connection on visibility change
          // For simplicity, we'll leave it open for now.
        } else {
          loadShipments().catch(() => {});
        }
      });
      
      setupSSE(); // Start listening for real-time updates
    }

    document.addEventListener('DOMContentLoaded', initPage);
  </script>

</body>
</html>
