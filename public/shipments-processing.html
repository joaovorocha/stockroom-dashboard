<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Process Shipments | San Francisco</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/shared-header.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/mobile.css">
  <style>
    .process-card {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .process-card.processing {
      border-color: #2196f3;
      background: rgba(33, 150, 243, 0.05);
    }
    .process-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .request-info {
      font-size: 12px;
      color: var(--text-muted);
    }
    .shipment-status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      text-transform: capitalize;
    }
    .shipment-status.requested { background: #9c27b0; color: #fff; }
    .shipment-status.shipped { background: #4caf50; color: #fff; }
    .process-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .detail-item label {
      display: block;
      color: var(--text-muted);
      font-size: 11px;
      margin-bottom: 2px;
    }
    .process-actions {
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .process-actions input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: monospace;
    }
    .process-actions input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }
    .empty-state h3 {
      margin-bottom: 8px;
      color: var(--text-secondary);
    }
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .tab-bar button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      cursor: pointer;
      font-size: 14px;
    }
    .tab-bar button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .notes-text {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      padding: 8px;
      background: var(--surface);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <a href="/dashboard" class="logo-link">
        <img src="/images/suitsupply-logo.svg" alt="Suitsupply" class="logo-img" onerror="this.outerHTML='<span class=\'logo-text\'>SUITSUPPLY</span>'">
      </a>
      <div class="header-title">
        <h1>Process Shipments</h1>
        <span class="location">San Francisco</span>
      </div>
    </div>
    <nav class="header-nav">
      <a href="/dashboard" id="navGamePlan">Game Plan</a>
      <a href="/shipments" id="navShipments">Shipments</a>
      <a href="/scanner" id="navScanner">Scanner</a>
      <a href="/lost-punch" id="navLostPunch">Lost Punch</a>
      <a href="/closing-duties" id="navClosingDuties">Closing Duties</a>
      <a href="/time-off" id="navTimeOff">Time Off</a>
      <a href="/ops-dashboard" id="navOpsDashboard">Looker Dashboards</a>
      <a href="/feedback" id="navFeedback" style="display:none;">Feedback</a>
      <a href="/admin" id="navAdmin" style="display:none;">Admin</a>
    </nav>
    <div class="header-actions">
      <div class="header-date">
        <span id="currentDate"></span>
      </div>
      <div class="header-user" id="userMenu">
        <img src="" alt="" id="userAvatar" class="user-avatar-img" onerror="this.style.display='none'">
        <span id="userName">Guest</span>
        <div class="user-dropdown" id="userDropdown">
          <a href="#" id="switchUserBtn">Switch User</a>
        </div>
      </div>
    </div>
  </header>

  <div class="dashboard-layout" style="grid-template-columns: 1fr;">
    <main class="main-content">
      <section class="section">
        <div class="section-header">
          <h2>Shipment Processing</h2>
          <button class="btn btn-secondary" onclick="window.location.href='/shipments'">&larr; Back to Shipments</button>
        </div>

        <div class="tab-bar">
          <button class="active" id="tabRequested">Requested (<span id="requestedCount">0</span>)</button>
          <button id="tabShipped">Recently Shipped (<span id="shippedCount">0</span>)</button>
        </div>

        <div id="processingList"></div>
      </section>
    </main>
  </div>

  <footer class="footer">
    <p>Daily Game Plan - San Francisco | Developed by Victor Rocha | 831-998-3808</p>
  </footer>

  <script>
    let shipments = [];
    let currentUser = null;
    let currentTab = 'requested';

    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
      await loadShipments();
      setupEventListeners();
    });

    async function checkAuth() {
      try {
        const response = await fetch('/api/auth/check');
        const data = await response.json();
        if (data.authenticated) {
          currentUser = data.user;
          document.getElementById('userName').textContent = currentUser.name;
          // Check if user has processing permission
          const canProcess = ['MANAGEMENT', 'BOH', 'ADMIN'].includes(currentUser.role) || currentUser.isManager || currentUser.isAdmin;
          if (!canProcess) {
            alert('Access denied. Only BOH and managers can process shipments.');
            window.location.href = '/shipments';
            return;
          }
          if (currentUser.isManager || currentUser.isAdmin) {
            document.getElementById('navAdmin').style.display = 'inline';
          }
        } else {
          alert('Please log in to access shipments.');
          window.location.href = '/login-v2';
        }
      } catch (e) {
        window.location.href = '/login-v2';
      }
    }

    async function loadShipments() {
      try {
        const response = await fetch('/api/shipments');
        shipments = await response.json();
        updateCounts();
        renderShipments();
      } catch (e) {
        console.error(e);
        shipments = [];
      }
    }

    function updateCounts() {
      const requested = shipments.filter(s => s.status === 'requested').length;
      const shipped = shipments.filter(s => s.status === 'shipped').length;
      document.getElementById('requestedCount').textContent = requested;
      document.getElementById('shippedCount').textContent = shipped;
    }

    function renderShipments() {
      const container = document.getElementById('processingList');

      let filtered;
      if (currentTab === 'requested') {
        filtered = shipments.filter(s => s.status === 'requested');
      } else {
        filtered = shipments.filter(s => s.status === 'shipped')
          .sort((a, b) => new Date(b.shippedAt || b.createdAt) - new Date(a.shippedAt || a.createdAt))
          .slice(0, 20);
      }

      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>${currentTab === 'requested' ? 'No Pending Requests' : 'No Recent Shipments'}</h3>
            <p>${currentTab === 'requested' ? 'All shipment requests have been processed!' : 'No shipments have been processed recently.'}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(s => `
        <div class="process-card" id="card-${s.id}">
          <div class="process-header">
            <div>
              <strong>${s.customerName}</strong>
              <div class="request-info">
                Requested by ${s.employeeName} on ${new Date(s.createdAt).toLocaleDateString()}
              </div>
            </div>
            <span class="shipment-status ${s.status}">${s.status}</span>
          </div>
          <div class="process-details">
            <div class="detail-item">
              <label>Order #</label>
              <span>${s.orderNumber ? `<a href="https://mao.suitsupply.com/order/${s.orderNumber}" target="_blank" style="color: var(--primary);">${s.orderNumber} &rarr;</a>` : '-'}</span>
            </div>
            <div class="detail-item">
              <label>Carrier</label>
              <span>${s.carrier || 'UPS'}</span>
            </div>
            <div class="detail-item">
              <label>Address</label>
              <span>${s.address || '-'}</span>
            </div>
          </div>
          ${s.notes ? `<div class="notes-text"><strong>Notes:</strong> ${s.notes}</div>` : ''}
          ${currentTab === 'requested' ? `
            <div class="process-actions">
              <input type="text" id="tracking-${s.id}" placeholder="Enter tracking number (e.g., 1Z...)" value="${s.trackingNumber || ''}">
              <button class="btn btn-primary" onclick="markShipped('${s.id}')">Mark Shipped</button>
            </div>
          ` : `
            <div class="process-actions" style="justify-content: space-between;">
              <span style="font-family: monospace; font-weight: 600;">${s.trackingNumber || 'No tracking'}</span>
              <a href="https://www.ups.com/track?tracknum=${s.trackingNumber}" target="_blank" class="btn btn-secondary">Track on UPS</a>
            </div>
          `}
        </div>
      `).join('');
    }

    async function markShipped(shipmentId) {
      const trackingInput = document.getElementById(`tracking-${shipmentId}`);
      const trackingNumber = trackingInput.value.trim();

      if (!trackingNumber) {
        alert('Please enter a tracking number');
        trackingInput.focus();
        return;
      }

      try {
        const response = await fetch(`/api/shipments/${shipmentId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            trackingNumber,
            status: 'shipped',
            shippedAt: new Date().toISOString(),
            shippedBy: currentUser.name
          })
        });

        if (response.ok) {
          await loadShipments();
        } else {
          alert('Error updating shipment');
        }
      } catch (e) {
        console.error(e);
        alert('Error updating shipment');
      }
    }

    function setupEventListeners() {
      document.getElementById('tabRequested').addEventListener('click', () => {
        currentTab = 'requested';
        document.getElementById('tabRequested').classList.add('active');
        document.getElementById('tabShipped').classList.remove('active');
        renderShipments();
      });

      document.getElementById('tabShipped').addEventListener('click', () => {
        currentTab = 'shipped';
        document.getElementById('tabShipped').classList.add('active');
        document.getElementById('tabRequested').classList.remove('active');
        renderShipments();
      });
    }
  </script>
  <script src="/js/shared-header.js"></script>
</body>
</html>
