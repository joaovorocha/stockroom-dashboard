<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Process Shipments | San Francisco</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/shared-header.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/mobile.css">
  <style>
    .process-card {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .process-card.processing {
      border-color: #2196f3;
      background: rgba(33, 150, 243, 0.05);
    }
    .process-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .request-info {
      font-size: 12px;
      color: var(--text-muted);
    }
    .shipment-status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      text-transform: capitalize;
    }
    .shipment-status.requested { background: #9c27b0; color: #fff; }
    .shipment-status.label-created { background: #607d8b; color: #fff; }
    .shipment-status.in-transit { background: #2196f3; color: #fff; }
    .shipment-status.delivered { background: #4caf50; color: #fff; }
    .shipment-status.unknown { background: #9e9e9e; color: #fff; }
    .process-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .detail-item label {
      display: block;
      color: var(--text-muted);
      font-size: 11px;
      margin-bottom: 2px;
    }
    .process-actions {
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .process-actions input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: monospace;
    }
    .process-actions input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }
    .empty-state h3 {
      margin-bottom: 8px;
      color: var(--text-secondary);
    }
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .tab-bar button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      cursor: pointer;
      font-size: 14px;
    }
    .tab-bar button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .notes-text {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      padding: 8px;
      background: var(--surface);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <a href="/dashboard" class="logo-link">
        <img src="/images/suitsupply-logo.svg" alt="Suitsupply" class="logo-img" onerror="this.outerHTML='<span class=\'logo-text\'>SUITSUPPLY</span>'">
      </a>
      <div class="header-title">
        <h1>Process Shipments</h1>
        <span class="location">San Francisco</span>
      </div>
    </div>
    <nav class="header-nav">
      <a href="/dashboard" id="navGamePlan">Game Plan</a>
      <a href="/shipments" id="navShipments">Shipments</a>
      <a href="/scanner" id="navScanner">Scanner</a>
      <a href="/lost-punch" id="navLostPunch">Lost Punch</a>
      <a href="/closing-duties" id="navClosingDuties">Closing Duties</a>
      <a href="/time-off" id="navTimeOff">Time Off</a>
      <a href="/ops-dashboard" id="navOpsDashboard">Looker Dashboards</a>
      <a href="/feedback" id="navFeedback" style="display:none;">Feedback</a>
      <a href="/admin" id="navAdmin" style="display:none;">Admin</a>
    </nav>
    <div class="header-actions">
      <div class="header-date">
        <span id="currentDate"></span>
      </div>
      <div class="header-user" id="userMenu">
        <img src="" alt="" id="userAvatar" class="user-avatar-img" onerror="this.style.display='none'">
        <span id="userName">Guest</span>
        <div class="user-dropdown" id="userDropdown">
          <a href="#" id="switchUserBtn">Switch User</a>
        </div>
      </div>
    </div>
  </header>

  <div class="dashboard-layout" style="grid-template-columns: 1fr;">
    <main class="main-content">
      <section class="section">
        <div class="section-header">
          <h2>Shipment Processing</h2>
          <button class="btn btn-secondary" id="campusShipImportBtn" style="display:none;" onclick="window.location.href='/ups-campusship-import'">Import CampusShip CSV</button>
          <button class="btn btn-secondary" onclick="window.location.href='/shipments'">&larr; Back to Shipments</button>
        </div>

        <div class="tab-bar">
          <button class="active" id="tabRequested">Requested (<span id="requestedCount">0</span>)</button>
        </div>

        <div id="processingList"></div>
      </section>
    </main>
  </div>

  <footer class="footer">
    <p>Daily Game Plan - San Francisco | Developed by Victor Rocha | 831-998-3808</p>
  </footer>

  <script src="/js/utils.js"></script>
  <script>
    let shipments = [];
    let currentUser = null;
    const UPS_CREATE_URL = 'https://www.campusship.ups.com/cship/create?ActionOriginPair=CreateAShipment___StartSession&loc=en_US';

    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
      await loadShipments();
      setupEventListeners();
      setupExtensionStatus();
    });

    async function checkAuth() {
      try {
        const response = await fetch('/api/auth/check');
        const data = await response.json();
        if (data.authenticated) {
          currentUser = data.user;
          document.getElementById('userName').textContent = currentUser.name;
          // Check if user has processing permission
          const canProcess = ['MANAGEMENT', 'BOH', 'ADMIN'].includes(currentUser.role) || currentUser.isManager || currentUser.isAdmin;
          if (!canProcess) {
            alert('Access denied. Only BOH and managers can process shipments.');
            window.location.href = '/shipments';
            return;
          }

          const canImport = ['MANAGEMENT', 'BOH', 'ADMIN'].includes(currentUser.role) || currentUser.isManager || currentUser.isAdmin;
          const importBtn = document.getElementById('campusShipImportBtn');
          if (importBtn && canImport) importBtn.style.display = '';

          if (currentUser.isManager || currentUser.isAdmin) {
            document.getElementById('navAdmin').style.display = 'inline';
          }
        } else {
          alert('Please log in to access shipments.');
          window.location.href = '/login-v2';
        }
      } catch (e) {
        window.location.href = '/login-v2';
      }
    }

    async function loadShipments() {
      try {
        const response = await fetch('/api/shipments');
        if (!response.ok) {
          if (response.status === 401) {
            window.location.href = '/login-v2';
            return;
          }
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        if (!Array.isArray(data)) {
          window.location.href = '/login-v2';
          return;
        }
        shipments = data;
        updateCounts();
        renderShipments();
      } catch (e) {
        console.error(e);
        shipments = [];
      }
    }

    function updateCounts() {
      const requested = shipments.filter(s => s.status === 'requested').length;
      document.getElementById('requestedCount').textContent = requested;
    }

    function formatAddressForDisplay(shipment) {
      const addr = shipment?.address;
      if (!addr) return shipment?.destination || shipment?.addressLine1 || shipment?.fullAddress || '-';
      if (typeof addr === 'string') return addr || '-';
      const parts = [
        addr.line1,
        addr.line2,
        [addr.city, addr.state, addr.zip].filter(Boolean).join(' '),
        addr.country
      ].filter(Boolean);
      return parts.length ? parts.join(', ') : '-';
    }

    function renderShipments() {
      const container = document.getElementById('processingList');

      const filtered = shipments.filter(s => s.status === 'requested');

      if (!filtered.length) {
        window.location.href = '/dashboard';
        return;
      }

      container.innerHTML = filtered.map(s => `
        <div class="process-card" id="card-${s.id}">
          <div class="process-header">
            <div>
              <strong>${s.customerName}</strong>
              <div class="request-info">
                Requested by ${s.employeeName} on ${new Date(s.createdAt).toLocaleDateString()}
              </div>
            </div>
            <span class="shipment-status ${s.status}">${s.status}</span>
          </div>
          <div class="process-details">
            <div class="detail-item">
              <label>Order #</label>
              <span>${s.orderNumber ? (() => { const url = getMAOOrderURL(s.orderNumber); return url ? `<a href="${url}" target="_blank" style="color: var(--primary);">${s.orderNumber} &rarr;</a>` : s.orderNumber; })() : '-'}</span>
            </div>
            <div class="detail-item">
              <label>Carrier</label>
              <span>${s.carrier || 'UPS'}</span>
            </div>
            <div class="detail-item">
              <label>Address</label>
              <span>${formatAddressForDisplay(s)}</span>
            </div>
          </div>
          ${s.notes ? `<div class="notes-text"><strong>Notes:</strong> ${s.notes}</div>` : ''}
          <div class="process-actions">
            <button class="btn btn-primary" onclick="shipAtUPS('${s.id}')">Ship at UPS</button>
            <button class="btn btn-secondary" onclick="editShipment('${s.id}')">Edit</button>
            <input type="text" id="tracking-${s.id}" placeholder="Optional: paste tracking number (1Z...)" value="${s.trackingNumber || ''}">
            <button class="btn btn-secondary" onclick="markShipped('${s.id}')">Save Tracking</button>
          </div>
        </div>
      `).join('');
    }

    async function markShipped(shipmentId) {
      const trackingInput = document.getElementById(`tracking-${shipmentId}`);
      const trackingNumber = trackingInput.value.trim();

      if (!trackingNumber) {
        alert('Please enter a tracking number');
        trackingInput.focus();
        return;
      }

      try {
        const response = await fetch(`/api/shipments/${shipmentId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            trackingNumber,
            status: 'label-created',
            shippedAt: new Date().toISOString(),
            shippedBy: currentUser.name,
            processedByName: currentUser.name,
            processedById: currentUser.employeeId
          })
        });

        if (response.ok) {
          await loadShipments();
        } else {
          alert('Error updating shipment');
        }
      } catch (e) {
        console.error(e);
        alert('Error updating shipment');
      }
    }

    async function shipAtUPS(shipmentId) {
      const shipment = shipments.find(s => s.id === shipmentId);
      if (!shipment) return;

      const enrichedShipment = {
        ...shipment,
        processedByName: currentUser?.name || shipment.processedByName || '',
        processedById: currentUser?.employeeId || shipment.processedById || ''
      };

      try {
        await fetch(`/api/shipments/${shipmentId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            processedByName: enrichedShipment.processedByName,
            processedById: enrichedShipment.processedById,
            processingStartedAt: new Date().toISOString()
          })
        });
      } catch (_) {}

      window.postMessage({ type: 'UPS_EXT_SET_ACTIVE_SHIPMENT', shipment: enrichedShipment }, window.location.origin);
      window.open(UPS_CREATE_URL, '_blank', 'noopener');
    }

    function editShipment(shipmentId) {
      window.location.href = `/shipments?edit=${encodeURIComponent(shipmentId)}`;
    }

    function setupExtensionStatus() {
      const header = document.querySelector('.section-header');
      if (!header) return;

      const badge = document.createElement('span');
      badge.style.marginLeft = '12px';
      badge.style.fontSize = '12px';
      badge.style.color = 'var(--text-secondary)';

      const isInstalled = document.documentElement.dataset.upsShipmentExtInstalled === '1';
      if (isInstalled) {
        badge.textContent = 'UPS Extension: Installed';
      } else {
        badge.innerHTML = `UPS Extension: Not installed · <a href="/ups-extension" style="color: var(--primary); text-decoration:none;">Get it</a>`;
      }

      header.appendChild(badge);
    }

    function setupEventListeners() {
      // No extra tabs; keep this page focused on shipments that still need labels.
    }
  </script>
  <script src="/js/shared-header.js"></script>
</body>
</html>
