<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Stockroom Dashboard</title>
  <link rel="stylesheet" href="/css/terminal.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>STOCKROOM DASHBOARD</h1>
      <div class="subtitle">San Francisco</div>
    </div>

    <div class="welcome">
      <h2>Login Required</h2>
      <p>Please enter your SuitSupply Employee ID to continue.</p>
    </div>

    <div id="error-message" class="error hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="employee-id">Employee ID:</label>
        <input
          type="text"
          id="employee-id"
          name="employeeId"
          placeholder="Enter your ID number"
          required
          autofocus
        >
      </div>

      <button type="submit" class="btn">Login</button>
    </form>

    <div class="nav-section" style="margin-top: 30px;">
      <p style="color: #999; text-align: center;">Need help? Contact your manager.</p>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
